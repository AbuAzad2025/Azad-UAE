# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '**.css'
      - '**.svg'
      - '**.png'
      - '**.jpg'
      - '**.ico'
      - '**.woff'
      - '**.woff2'
      - '**.ttf'
      - 'static/adminlte/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '**.css'
      - '**.svg'
      - '**.png'
      - '**.jpg'
      - '**.ico'
      - '**.woff'
      - '**.woff2'
      - '**.ttf'
      - 'static/adminlte/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ── Matrix engine: adapt PG version grid to Git ref ──
  determine-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          IS_MAIN_OR_TAG='${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}'
          if [ "$IS_MAIN_OR_TAG" = "true" ]; then
            MATRIX='{"include":[
              {"postgres-version":15,"test-group":"routes",  "test-path":"tests/unit/routes/",             "cov-flag":"unit-routes-pg15"},
              {"postgres-version":16,"test-group":"routes",  "test-path":"tests/unit/routes/",             "cov-flag":"unit-routes-pg16"},
              {"postgres-version":17,"test-group":"routes",  "test-path":"tests/unit/routes/",             "cov-flag":"unit-routes-pg17"},
              {"postgres-version":15,"test-group":"services","test-path":"tests/unit/services/",           "cov-flag":"unit-services"},
              {"postgres-version":15,"test-group":"models",  "test-path":"tests/unit/models/",             "cov-flag":"unit-models"},
              {"postgres-version":15,"test-group":"ai_knowledge","test-path":"tests/unit/ai_knowledge/",  "cov-flag":"unit-ai-knowledge"},
              {"postgres-version":15,"test-group":"utils",   "test-path":"tests/unit/utils/ tests/unit/app/ tests/unit/runtime_core/", "cov-flag":"unit-utils"},
              {"postgres-version":15,"test-group":"core",    "test-path":"tests/unit/ --ignore=tests/unit/routes --ignore=tests/unit/services --ignore=tests/unit/ai_knowledge --ignore=tests/unit/models --ignore=tests/unit/utils --ignore=tests/unit/app --ignore=tests/unit/runtime_core", "cov-flag":"unit-core"},
              {"postgres-version":15,"test-group":"integration","test-path":"tests/integration/",          "cov-flag":"integration"},
              {"postgres-version":15,"test-group":"e2e",     "test-path":"tests/e2e/ --ignore=tests/e2e/tours/","cov-flag":"e2e"}
            ]}'
          else
            MATRIX='{"include":[
              {"postgres-version":16,"test-group":"routes",  "test-path":"tests/unit/routes/",             "cov-flag":"unit-routes"},
              {"postgres-version":16,"test-group":"services","test-path":"tests/unit/services/",           "cov-flag":"unit-services"},
              {"postgres-version":16,"test-group":"models",  "test-path":"tests/unit/models/",             "cov-flag":"unit-models"},
              {"postgres-version":16,"test-group":"ai_knowledge","test-path":"tests/unit/ai_knowledge/",  "cov-flag":"unit-ai-knowledge"},
              {"postgres-version":16,"test-group":"utils",   "test-path":"tests/unit/utils/ tests/unit/app/ tests/unit/runtime_core/", "cov-flag":"unit-utils"},
              {"postgres-version":16,"test-group":"core",    "test-path":"tests/unit/ --ignore=tests/unit/routes --ignore=tests/unit/services --ignore=tests/unit/ai_knowledge --ignore=tests/unit/models --ignore=tests/unit/utils --ignore=tests/unit/app --ignore=tests/unit/runtime_core", "cov-flag":"unit-core"},
              {"postgres-version":16,"test-group":"integration","test-path":"tests/integration/",          "cov-flag":"integration"},
              {"postgres-version":16,"test-group":"e2e",     "test-path":"tests/e2e/ --ignore=tests/e2e/tours/","cov-flag":"e2e"}
            ]}'
          fi
          echo "matrix=$(echo "$MATRIX" | jq -c .)" >> $GITHUB_OUTPUT

  # ── Python tests split by directory ──
  test:
    needs: [determine-matrix]
    name: ${{ matrix.test-group }} (PG ${{ matrix.postgres-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJSON(needs.determine-matrix.outputs.matrix) }}

    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_USER: azad_test
          POSTGRES_PASSWORD: azad_test
          POSTGRES_DB: azad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://azad_test:azad_test@localhost:5432/azad_test
          SECRET_KEY: test-secret-key-not-for-production
          OWNER_PASSWORD: TestOwner@1234567890123456!
          APP_ENV: testing
          DEBUG: "true"
          PYTEST_ADDOPTS: ""
        run: |
          # Warm up: ensure DB schema exists
          python -c "from app import create_app; from extensions import db; app = create_app(); ctx = app.app_context(); ctx.push(); db.create_all(); ctx.pop()" || true
          # Run the assigned test group — fail-fast per job
          pytest ${{ matrix.test-path }} -v --tb=short \
            --cov --cov-config=.coveragerc --cov-report=term \
            --cov-report=xml:coverage-${{ matrix.cov-flag }}.xml

      - name: Upload coverage to Codecov (optional)
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage-${{ matrix.cov-flag }}.xml
          flags: ${{ matrix.cov-flag }}
          fail_ci_if_error: false

      - name: Upload raw coverage data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: covdata-${{ matrix.cov-flag }}
          path: .coverage
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload template coverage data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: templates-${{ matrix.cov-flag }}
          path: templates_rendered.json
          if-no-files-found: ignore
          retention-days: 1

  # ── App boot verification (quick smoke test) ──
  verify-boot:
    needs: [determine-matrix]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: azad_test
          POSTGRES_PASSWORD: azad_test
          POSTGRES_DB: azad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Verify app boots
        env:
          DATABASE_URL: postgresql://azad_test:azad_test@localhost:5432/azad_test
          SECRET_KEY: test-secret-key
          OWNER_PASSWORD: TestOwner@1234567890123456!
          APP_ENV: testing
        run: |
          python -c "from app import create_app; app = create_app()"

  # ── Security scan (bandit) ──
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt bandit
      - name: Bandit security scan
        run: |
          bandit -c .bandit.yml -r . --exclude 'migrations/,tests/' --quiet || bandit -c .bandit.yml -r . --exclude 'migrations/,tests/'
          bandit -c .bandit.yml -r . -f json -o bandit-report.json --exclude 'migrations/,tests/' || true

  # ── Lint, audit, i18n, cspell ──
  lint-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff mypy pip-audit
      - name: Install Node deps
        run: |
          npm install -g @biomejs/biome cspell
      - name: Ruff check
        run: ruff check . --output-format github
      - name: Ruff format
        run: ruff format . --check --diff
      - name: Mypy
        run: mypy . --ignore-missing-imports --no-error-summary --explicit-package-bases
      - name: Biome check (JS/CSS/JSON/HTML)
        run: biome check . --reporter github
      - name: pip-audit
        run: python -m pip_audit -r requirements.txt
      - name: Cspell (spell check templates & JS)
        run: |
          npx cspell --config scripts/lint/.cspell.json "templates/**/*.html" "static/js/**/*.js" "docs/**/*.md"
      - name: Strict i18n lint
        run: python scripts/check_strict_i18n.py templates routes services
      - name: actionlint (workflow syntax)
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@latest 2>/dev/null || \
            (which actionlint 2>/dev/null && actionlint .github/workflows/*.yml) || \
            echo "::warning::actionlint not available, skipping"
          # Alternative: use docker
          docker run --rm -v $PWD/.github/workflows:/repo ghcr.io/rhysd/actionlint:latest 2>&1 || true

  # ── Git & repository scanning ──
  repo-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-fs'

  # ── Docker infrastructure audit (Hadolint) ──
  docker-infra-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Hadolint Dockerfile Audit
        run: |
          echo "=== RUNNING DOCKERFILE LINT ==="
          docker run --rm -i -v "${PWD}/scripts/.hadolint.yaml:/root/.hadolint.yaml" hadolint/hadolint < scripts/lint/Dockerfile.ci

  # ── API fuzz testing (Schemathesis) ──
  api-fuzz:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: azad_test
          POSTGRES_PASSWORD: azad_test
          POSTGRES_DB: azad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt schemathesis
      - name: Boot app and run Schemathesis
        env:
          DATABASE_URL: postgresql://azad_test:azad_test@localhost:5432/azad_test
          SECRET_KEY: test-secret-key
          OWNER_PASSWORD: TestOwner@1234567890123456!
          APP_ENV: testing
        run: |
          # Start app in background
          python -m flask run --port=5000 --host=0.0.0.0 &
          sleep 5
          # Generate OpenAPI spec if not present, or use existing
          python -c "from app import create_app; app = create_app()" 2>&1 || true
          # Fuzz API endpoints
          schemathesis run http://localhost:5000/openapi.json \
            --checks all \
            --hypothesis-deadline 3000 \
            --exitfirst \
            --base-url http://localhost:5000 || \
          schemathesis run http://localhost:5000/swagger.json \
            --checks all \
            --exitfirst \
            --base-url http://localhost:5000 || \
          echo "::warning::Schemathesis could not find OpenAPI spec at /openapi.json or /swagger.json"

  # ── Tenant isolation fuzzer ──
  tenant-isolation-fuzzer:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: azad_test
          POSTGRES_PASSWORD: azad_test
          POSTGRES_DB: azad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tenant isolation fuzzer
        env:
          DATABASE_URL: postgresql://azad_test:azad_test@localhost:5432/azad_test
          SECRET_KEY: test-secret-key
          OWNER_PASSWORD: TestOwner@1234567890123456!
          APP_ENV: testing
          DEBUG: "true"
        run: |
          pytest tests/unit/utils/test_tenant_isolation_fuzzer.py -v --tb=short

  # ── Lighthouse CI (web vitals) ──
  lighthouse-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: azad_test
          POSTGRES_PASSWORD: azad_test
          POSTGRES_DB: azad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt gunicorn
          npm install -g @lhci/cli
      - name: Boot app and run Lighthouse CI
        env:
          DATABASE_URL: postgresql://azad_test:azad_test@localhost:5432/azad_test
          SECRET_KEY: test-secret-key
          OWNER_PASSWORD: TestOwner@1234567890123456!
          APP_ENV: testing
          CI: "true"
        run: |
          lhci autorun --config=scripts/lighthouserc.json || \
            echo "::warning::Lighthouse CI audit completed with warnings"

  # ── E2E business flow tours (Playwright) ──
  e2e-tours:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: azad_test
          POSTGRES_PASSWORD: azad_test
          POSTGRES_DB: azad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt gunicorn pytest-playwright
          python -m playwright install --with-deps chromium
      - name: Seed auth users and export states
        env:
          DATABASE_URL: postgresql://azad_test:azad_test@localhost:5432/azad_test
          SECRET_KEY: test-secret-key
          OWNER_PASSWORD: TestOwner@1234567890123456!
          APP_ENV: testing
        run: |
          python scripts/auth/setup_test_users.py
      - name: Run business flow tours
        env:
          DATABASE_URL: postgresql://azad_test:azad_test@localhost:5432/azad_test
          SECRET_KEY: test-secret-key
          OWNER_PASSWORD: TestOwner@1234567890123456!
          APP_ENV: testing
          PLAYWRIGHT_BASE_URL: http://localhost:5000
        run: |
          gunicorn --bind 0.0.0.0:5000 wsgi:app --daemon --error-logfile gunicorn.log
          sleep 5
          python -m pytest tests/e2e/tours/ -v --tb=short --base-url=http://localhost:5000 || \
            echo "::warning::Some E2E tours failed — review logs"
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  # ── Comprehensive coverage report (backend + frontend) ──
  coverage-report:
    needs: [test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install coverage
        run: pip install coverage

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: covdata-*
          path: coverage-data/

      - name: Download template coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: templates-*
          path: template-data/

      - name: Combine coverage data
        run: |
          # Combine all .coverage files from matrix jobs
          coverage combine coverage-data/covdata-*/.coverage || true

      - name: Generate comprehensive coverage report
        run: |
          python scripts/coverage_report.py || true

      - name: Upload combined coverage XML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-combined
          path: .coverage
          if-no-files-found: ignore
          retention-days: 7
