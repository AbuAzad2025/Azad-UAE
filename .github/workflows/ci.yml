name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: azad_test
          POSTGRES_PASSWORD: azad_test
          POSTGRES_DB: azad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run frontend unit tests
        run: |
          npm install
          npm run test:frontend

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://azad_test:azad_test@localhost:5432/azad_test
          SECRET_KEY: test-secret-key-not-for-production
          OWNER_PASSWORD: TestOwner@1234567890123456!
          APP_ENV: testing
          DEBUG: "true"
        run: |
          # Initialize database schema before running tests
          python -c "from app import create_app; from extensions import db; app = create_app(); ctx = app.app_context(); ctx.push(); db.create_all(); ctx.pop()" || true
          pytest tests/ -v --tb=short --cov --cov-report=term --cov-report=xml
      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Verify app boots
        env:
          DATABASE_URL: postgresql://azad_test:azad_test@localhost:5432/azad_test
          SECRET_KEY: test-secret-key
          OWNER_PASSWORD: TestOwner@1234567890123456!
          APP_ENV: testing
        run: |
          python -c "from app import create_app; app = create_app()"

      - name: Security scan (bandit)
        run: |
          bandit -r . -f json -o bandit-report.json --exclude 'migrations/,tests/' || true
          bandit -r . --exclude 'migrations/,tests/' || true
