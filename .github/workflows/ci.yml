# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

# ─────────────────────────────────────────────────────────────────────────────
# Coverage policy: every production file type is gated — Python, Jinja/HTML,
# JavaScript, CSS, YAML and JSON. Only documentation, binary assets and
# vendored third-party bundles (AdminLTE) may skip a CI run.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '**.svg'
      - '**.png'
      - '**.jpg'
      - '**.ico'
      - '**.woff'
      - '**.woff2'
      - '**.ttf'
      - 'static/adminlte/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '**.svg'
      - '**.png'
      - '**.jpg'
      - '**.ico'
      - '**.woff'
      - '**.woff2'
      - '**.ttf'
      - 'static/adminlte/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; jobs that need more declare it themselves.
permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'
  # Minimum total line coverage enforced in coverage-report.
  # 0 = report-only; raise it when the team is ready to enforce a floor.
  COVERAGE_FAIL_UNDER: '0'

jobs:
  # ── Matrix engine: adapt PG version grid to Git ref ──
  determine-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          IS_MAIN_OR_TAG='${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}'
          if [ "$IS_MAIN_OR_TAG" = "true" ]; then
            MATRIX='{"include":[
              {"postgres-version":15,"test-group":"routes",  "test-path":"tests/unit/routes/",             "cov-flag":"unit-routes-pg15"},
              {"postgres-version":16,"test-group":"routes",  "test-path":"tests/unit/routes/",             "cov-flag":"unit-routes-pg16"},
              {"postgres-version":17,"test-group":"routes",  "test-path":"tests/unit/routes/",             "cov-flag":"unit-routes-pg17"},
              {"postgres-version":15,"test-group":"services","test-path":"tests/unit/services/",           "cov-flag":"unit-services"},
              {"postgres-version":15,"test-group":"models",  "test-path":"tests/unit/models/",             "cov-flag":"unit-models"},
              {"postgres-version":15,"test-group":"ai_knowledge","test-path":"tests/unit/ai_knowledge/",  "cov-flag":"unit-ai-knowledge"},
              {"postgres-version":15,"test-group":"utils",   "test-path":"tests/unit/utils/ tests/unit/app/ tests/unit/runtime_core/", "cov-flag":"unit-utils"},
              {"postgres-version":15,"test-group":"core",    "test-path":"tests/unit/ --ignore=tests/unit/routes --ignore=tests/unit/services --ignore=tests/unit/ai_knowledge --ignore=tests/unit/models --ignore=tests/unit/utils --ignore=tests/unit/app --ignore=tests/unit/runtime_core", "cov-flag":"unit-core"},
              {"postgres-version":15,"test-group":"integration","test-path":"tests/integration/",          "cov-flag":"integration"},
              {"postgres-version":15,"test-group":"e2e",     "test-path":"tests/e2e/ --ignore=tests/e2e/tours/","cov-flag":"e2e"}
            ]}'
          else
            MATRIX='{"include":[
              {"postgres-version":16,"test-group":"routes",  "test-path":"tests/unit/routes/",             "cov-flag":"unit-routes"},
              {"postgres-version":16,"test-group":"services","test-path":"tests/unit/services/",           "cov-flag":"unit-services"},
              {"postgres-version":16,"test-group":"models",  "test-path":"tests/unit/models/",             "cov-flag":"unit-models"},
              {"postgres-version":16,"test-group":"ai_knowledge","test-path":"tests/unit/ai_knowledge/",  "cov-flag":"unit-ai-knowledge"},
              {"postgres-version":16,"test-group":"utils",   "test-path":"tests/unit/utils/ tests/unit/app/ tests/unit/runtime_core/", "cov-flag":"unit-utils"},
              {"postgres-version":16,"test-group":"core",    "test-path":"tests/unit/ --ignore=tests/unit/routes --ignore=tests/unit/services --ignore=tests/unit/ai_knowledge --ignore=tests/unit/models --ignore=tests/unit/utils --ignore=tests/unit/app --ignore=tests/unit/runtime_core", "cov-flag":"unit-core"},
              {"postgres-version":16,"test-group":"integration","test-path":"tests/integration/",          "cov-flag":"integration"},
              {"postgres-version":16,"test-group":"e2e",     "test-path":"tests/e2e/ --ignore=tests/e2e/tours/","cov-flag":"e2e"}
            ]}'
          fi
          echo "matrix=$(echo "$MATRIX" | jq -c .)" >> "$GITHUB_OUTPUT"

  # ── Python tests split by directory ──
  test:
    needs: [determine-matrix]
    name: ${{ matrix.test-group }} (PG ${{ matrix.postgres-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      # Never cancel sibling groups: every directory must report, even when
      # another group fails — no part of the test suite may be skipped.
      fail-fast: false
      matrix: ${{ fromJSON(needs.determine-matrix.outputs.matrix) }}

    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_USER: azad_test
          POSTGRES_PASSWORD: azad_test
          POSTGRES_DB: azad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://azad_test:azad_test@localhost:5432/azad_test
          SECRET_KEY: test-secret-key-not-for-production
          OWNER_PASSWORD: TestOwner@1234567890123456!
          APP_ENV: testing
          DEBUG: "true"
          PYTEST_ADDOPTS: ""
        run: |
          # Warm up: ensure DB schema exists
          python -c "from app import create_app; from extensions import db; app = create_app(); ctx = app.app_context(); ctx.push(); db.create_all(); ctx.pop()" || true
          # Run the assigned test group
          pytest ${{ matrix.test-path }} -v --tb=short \
            --cov=. --cov-config=.coveragerc --cov-report=term \
            --cov-report=xml:coverage-${{ matrix.cov-flag }}.xml
          coverage combine 2>/dev/null || true
          ls -la .coverage 2>/dev/null || true
          cp .coverage coverage-data-${{ matrix.cov-flag }} 2>/dev/null || true

      - name: Upload coverage to Codecov (optional)
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage-${{ matrix.cov-flag }}.xml
          flags: ${{ matrix.cov-flag }}
          fail_ci_if_error: false

      - name: Upload raw coverage data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: covdata-${{ matrix.cov-flag }}
          path: coverage-data-${{ matrix.cov-flag }}
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload template coverage data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: templates-${{ matrix.cov-flag }}
          path: templates_rendered.json
          if-no-files-found: ignore
          retention-days: 1

  # ── App boot verification (quick smoke test) ──
  verify-boot:
    needs: [determine-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: azad_test
          POSTGRES_PASSWORD: azad_test
          POSTGRES_DB: azad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Verify app boots
        env:
          DATABASE_URL: postgresql://azad_test:azad_test@localhost:5432/azad_test
          SECRET_KEY: test-secret-key
          OWNER_PASSWORD: TestOwner@1234567890123456!
          APP_ENV: testing
        run: |
          python -c "from app import create_app; app = create_app()"

  # ── Security scan (bandit) ──
  # Scope comes ONLY from .bandit.yml — no inline excludes, so no production
  # Python file can silently drop out of the scan.
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit
      - name: Bandit security scan (gate)
        run: bandit -c .bandit.yml -r .
      - name: Bandit JSON report
        if: always()
        run: bandit -c .bandit.yml -r . -f json -o bandit-report.json || true
      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json
          if-no-files-found: ignore
          retention-days: 7

  # ── Static quality gates: Python · Jinja/HTML · JS · CSS · YAML · JSON ──
  lint-audit:
    name: Static quality (py · jinja · js · css · yaml · json)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Python lint tools
        run: |
          python -m pip install --upgrade pip
          # Full requirements are REQUIRED here: mypy needs real flask types
          # (e.g. abort() -> NoReturn) for correct narrowing — a slim install
          # degrades every unresolved import to Any and produces false errors.
          pip install -r requirements.txt ruff mypy pip-audit yamllint jinja2

      - name: Install Node lint tools
        run: |
          npm ci --no-audit --no-fund
          npm install -g @biomejs/biome@2.5.4 cspell

      # ── Python ──
      - name: Ruff check (Python lint)
        run: ruff check . --output-format github

      - name: Ruff format (Python formatting)
        run: ruff format . --check --diff

      - name: Mypy (Python types)
        run: mypy . --ignore-missing-imports --no-error-summary --explicit-package-bases

      # ── Jinja / HTML templates ──
      - name: Jinja template gate (all templates must parse)
        run: python scripts/lint/check_templates.py

      - name: Strict i18n lint (templates & Python)
        run: python scripts/check_strict_i18n.py templates routes services --exclude-dirs services

      # ── JavaScript ──
      - name: Biome check (JS lint+format, scope from biome.json)
        run: biome check . --reporter github

      - name: Frontend unit tests (vitest with coverage)
        run: npm test -- --coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-frontend
          path: coverage-frontend/
          if-no-files-found: ignore
          retention-days: 7

      # ── CSS ──
      - name: Stylelint (all project CSS)
        run: npx stylelint "static/**/*.css"

      # ── JSON ──
      - name: JSON validation (every tracked .json file)
        run: |
          fail=0
          count=0
          while IFS= read -r f; do
            count=$((count + 1))
            if ! python -m json.tool "$f" > /dev/null 2>&1; then
              echo "::error file=$f::Invalid JSON"
              fail=1
            fi
          done < <(git ls-files '*.json' -- ':!:node_modules')
          echo "Validated ${count} JSON file(s)"
          exit $fail

      # ── YAML ──
      - name: yamllint (every tracked .yml/.yaml file)
        run: |
          git ls-files '*.yml' '*.yaml' -- ':!:node_modules' | \
            xargs python -m yamllint -c .yamllint.yml

      # ── Dependencies & spelling ──
      - name: pip-audit (known vulnerabilities in requirements)
        run: python -m pip_audit -r requirements.txt

      - name: Cspell (templates & project JS)
        run: |
          npx cspell --config scripts/lint/.cspell.json \
            "templates/**/*.html" "static/js/**/*.js" "static/*.js"

      # ── GitHub Actions workflows themselves ──
      - name: actionlint (workflow syntax — fails on findings)
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo \
            docker.io/rhysd/actionlint:latest .github/workflows/*.yml

  # ── Git & repository scanning ──
  repo-security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-fs'

  # ── Docker infrastructure audit (Hadolint) ──
  docker-infra-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Hadolint Dockerfile Audit
        run: |
          echo "=== RUNNING DOCKERFILE LINT ==="
          docker run --rm -i -v "${PWD}/scripts/.hadolint.yaml:/root/.hadolint.yaml" hadolint/hadolint < scripts/lint/Dockerfile.ci

  # ── API fuzz testing (Schemathesis, non-blocking) ──
  api-fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: azad_test
          POSTGRES_PASSWORD: azad_test
          POSTGRES_DB: azad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt schemathesis
      - name: Boot app and run Schemathesis (non-blocking)
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://azad_test:azad_test@localhost:5432/azad_test
          SECRET_KEY: test-secret-key
          OWNER_PASSWORD: TestOwner@1234567890123456!
          APP_ENV: testing
          ENABLE_SWAGGER_UI: "true"
          DEBUG: "true"
        run: |
          # Start app in background
          python -m flask run --port=5000 --host=0.0.0.0 &
          sleep 5
          # Fuzz API endpoints — spec is served at /api-docs/openapi.json
          schemathesis run http://localhost:5000/api-docs/openapi.json \
            --checks all \
            --hypothesis-deadline 3000 \
            --exitfirst \
            --base-url http://localhost:5000

  # ── Tenant isolation fuzzer ──
  tenant-isolation-fuzzer:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: azad_test
          POSTGRES_PASSWORD: azad_test
          POSTGRES_DB: azad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tenant isolation fuzzer
        env:
          DATABASE_URL: postgresql://azad_test:azad_test@localhost:5432/azad_test
          SECRET_KEY: test-secret-key
          OWNER_PASSWORD: TestOwner@1234567890123456!
          APP_ENV: testing
          DEBUG: "true"
        run: |
          pytest tests/unit/utils/test_tenant_isolation_fuzzer.py -v --tb=short

  # ── Lighthouse CI (web vitals, non-blocking) ──
  lighthouse-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: azad_test
          POSTGRES_PASSWORD: azad_test
          POSTGRES_DB: azad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt gunicorn
          npm install -g @lhci/cli
      - name: Boot app and run Lighthouse CI (non-blocking)
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://azad_test:azad_test@localhost:5432/azad_test
          SECRET_KEY: test-secret-key
          OWNER_PASSWORD: TestOwner@1234567890123456!
          APP_ENV: testing
          CI: "true"
        run: |
          lhci autorun --config=scripts/lighthouserc.json

  # ── E2E business flow tours (Playwright, non-blocking) ──
  e2e-tours:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: azad_test
          POSTGRES_PASSWORD: azad_test
          POSTGRES_DB: azad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt gunicorn pytest-playwright
          python -m playwright install --with-deps chromium
      - name: Seed auth users and export states
        env:
          DATABASE_URL: postgresql://azad_test:azad_test@localhost:5432/azad_test
          SECRET_KEY: test-secret-key
          OWNER_PASSWORD: TestOwner@1234567890123456!
          APP_ENV: testing
        run: |
          python scripts/auth/setup_test_users.py
      - name: Run business flow tours (non-blocking)
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://azad_test:azad_test@localhost:5432/azad_test
          SECRET_KEY: test-secret-key
          OWNER_PASSWORD: TestOwner@1234567890123456!
          APP_ENV: testing
          PLAYWRIGHT_BASE_URL: http://localhost:5000
        run: |
          gunicorn --bind 0.0.0.0:5000 wsgi:app --daemon --error-logfile gunicorn.log
          sleep 5
          python -m pytest tests/e2e/tours/ -v --tb=short --base-url=http://localhost:5000
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  # ── Comprehensive coverage report (backend + frontend) ──
  coverage-report:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always()
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install coverage
        run: pip install coverage

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: covdata-*
          path: coverage-data/

      - name: Download template coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: templates-*
          path: template-data/

      - name: Download frontend coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-frontend
          path: coverage-frontend/

      - name: Combine coverage data
        run: |
          shopt -s nullglob
          files=(coverage-data/covdata-*/coverage-data-*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::warning::No coverage data artifacts found — test jobs may have failed early"
            exit 0
          fi
          coverage combine "${files[@]}"
          cp .coverage coverage-combined-data

      - name: Enforce coverage floor (COVERAGE_FAIL_UNDER=${{ env.COVERAGE_FAIL_UNDER }})
        if: hashFiles('.coverage') != ''
        run: coverage report --show-missing --fail-under=${{ env.COVERAGE_FAIL_UNDER }}

      - name: Generate comprehensive coverage report
        if: hashFiles('.coverage') != ''
        run: python scripts/coverage_report.py

      - name: Upload combined coverage data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-combined
          path: coverage-combined-data
          if-no-files-found: ignore
          retention-days: 7
