name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '**.css'
      - '**.svg'
      - '**.png'
      - '**.jpg'
      - '**.ico'
      - '**.woff'
      - '**.woff2'
      - '**.ttf'
      - 'templates/**'
      - 'static/adminlte/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '**.css'
      - '**.svg'
      - '**.png'
      - '**.jpg'
      - '**.ico'
      - '**.woff'
      - '**.woff2'
      - '**.ttf'
      - 'templates/**'
      - 'static/adminlte/**'

jobs:
  # ── Matrix engine: adapt PG version grid to Git ref ──
  determine-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          IS_MAIN_OR_TAG='${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}'
          if [ "$IS_MAIN_OR_TAG" = "true" ]; then
            MATRIX='{"include":[
              {"postgres-version":15,"test-group":"routes",  "test-path":"tests/unit/routes/",             "cov-flag":"unit-routes-pg15"},
              {"postgres-version":16,"test-group":"routes",  "test-path":"tests/unit/routes/",             "cov-flag":"unit-routes-pg16"},
              {"postgres-version":17,"test-group":"routes",  "test-path":"tests/unit/routes/",             "cov-flag":"unit-routes-pg17"},
              {"postgres-version":15,"test-group":"services","test-path":"tests/unit/services/",           "cov-flag":"unit-services"},
              {"postgres-version":15,"test-group":"models",  "test-path":"tests/unit/models/",             "cov-flag":"unit-models"},
              {"postgres-version":15,"test-group":"ai_knowledge","test-path":"tests/unit/ai_knowledge/",  "cov-flag":"unit-ai-knowledge"},
              {"postgres-version":15,"test-group":"utils",   "test-path":"tests/unit/utils/ tests/unit/app/ tests/unit/runtime_core/", "cov-flag":"unit-utils"},
              {"postgres-version":15,"test-group":"core",    "test-path":"tests/unit/ --ignore=tests/unit/routes --ignore=tests/unit/services --ignore=tests/unit/ai_knowledge --ignore=tests/unit/models --ignore=tests/unit/utils --ignore=tests/unit/app --ignore=tests/unit/runtime_core", "cov-flag":"unit-core"},
              {"postgres-version":15,"test-group":"integration","test-path":"tests/integration/",          "cov-flag":"integration"},
              {"postgres-version":15,"test-group":"e2e",     "test-path":"tests/e2e/",                    "cov-flag":"e2e"}
            ]}'
          else
            MATRIX='{"include":[
              {"postgres-version":16,"test-group":"routes",  "test-path":"tests/unit/routes/",             "cov-flag":"unit-routes"},
              {"postgres-version":16,"test-group":"services","test-path":"tests/unit/services/",           "cov-flag":"unit-services"},
              {"postgres-version":16,"test-group":"models",  "test-path":"tests/unit/models/",             "cov-flag":"unit-models"},
              {"postgres-version":16,"test-group":"ai_knowledge","test-path":"tests/unit/ai_knowledge/",  "cov-flag":"unit-ai-knowledge"},
              {"postgres-version":16,"test-group":"utils",   "test-path":"tests/unit/utils/ tests/unit/app/ tests/unit/runtime_core/", "cov-flag":"unit-utils"},
              {"postgres-version":16,"test-group":"core",    "test-path":"tests/unit/ --ignore=tests/unit/routes --ignore=tests/unit/services --ignore=tests/unit/ai_knowledge --ignore=tests/unit/models --ignore=tests/unit/utils --ignore=tests/unit/app --ignore=tests/unit/runtime_core", "cov-flag":"unit-core"},
              {"postgres-version":16,"test-group":"integration","test-path":"tests/integration/",          "cov-flag":"integration"},
              {"postgres-version":16,"test-group":"e2e",     "test-path":"tests/e2e/",                    "cov-flag":"e2e"}
            ]}'
          fi
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  # ── Python tests split by directory ──
  test:
    needs: [determine-matrix]
    name: ${{ matrix.test-group }} (PG ${{ matrix.postgres-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJSON(needs.determine-matrix.outputs.matrix) }}

    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_USER: azad_test
          POSTGRES_PASSWORD: azad_test
          POSTGRES_DB: azad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://azad_test:azad_test@localhost:5432/azad_test
          SECRET_KEY: test-secret-key-not-for-production
          OWNER_PASSWORD: TestOwner@1234567890123456!
          APP_ENV: testing
          DEBUG: "true"
          PYTEST_ADDOPTS: ""
        run: |
          # Warm up: ensure DB schema exists
          python -c "from app import create_app; from extensions import db; app = create_app(); ctx = app.app_context(); ctx.push(); db.create_all(); ctx.pop()" || true
          # Run the assigned test group — fail-fast per job
          pytest ${{ matrix.test-path }} -x -v --tb=short \
            --cov --cov-config=.coveragerc --cov-report=term \
            --cov-report=xml:coverage-${{ matrix.cov-flag }}.xml

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage-${{ matrix.cov-flag }}.xml
          flags: ${{ matrix.cov-flag }}
          fail_ci_if_error: false

  # ── App boot verification (quick smoke test) ──
  verify-boot:
    needs: [determine-matrix]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: azad_test
          POSTGRES_PASSWORD: azad_test
          POSTGRES_DB: azad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Verify app boots
        env:
          DATABASE_URL: postgresql://azad_test:azad_test@localhost:5432/azad_test
          SECRET_KEY: test-secret-key
          OWNER_PASSWORD: TestOwner@1234567890123456!
          APP_ENV: testing
        run: |
          python -c "from app import create_app; app = create_app()"

  # ── Security scan (no DB needed) ──
  security-scan:
    needs: []
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Security scan (bandit)
        run: |
          bandit -r . -f json -o bandit-report.json --exclude 'migrations/,tests/' || true
          bandit -r . --exclude 'migrations/,tests/' || true
