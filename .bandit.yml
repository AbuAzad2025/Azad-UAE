# Bandit configuration — single source of truth for security-scan scope.
# CI runs `bandit -c .bandit.yml -r .` with NO extra inline excludes, so every
# production Python line is scanned. Exclusions below are limited to
# non-production or generated code, each with a justification.

skips:
  - B101  # assert_used — acceptable in defensive runtime assertions
  - B105  # hardcoded_password — false positives on Arabic messages, column defs, token salts
  - B106  # hardcoded_password_funcarg — false positives on fixture params
  - B107  # hardcoded_tmp_directory — uses tempfile in controlled paths
  - B108  # hardcoded_tmp_directory — uses tempfile in controlled paths
  - B110  # try_except_pass — acceptable in cleanup/teardown paths
  - B112  # try_except_continue — acceptable in data-processing loops
  - B113  # requests_without_timeout — all call sites pass a timeout

exclude_dirs:
  # Auto-generated Alembic revisions — not hand-written production logic.
  - 'migrations'
  # Test code — not deployed; covered by the test suite itself.
  - 'tests'
  # Local virtualenv — third-party, not project code.
  - '.venv'
  # NOTE: utils/secure_subprocess.py is intentionally SCANNED. It is the
  # audited subprocess chokepoint; its two intentional primitives carry
  # in-line `# nosec` justifications so any NEW issue there fails the build.
