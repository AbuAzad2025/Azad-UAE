{% extends 'base.html' %}
{% block title %}Warranty Claims{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header"><h3>Warranty Claims</h3></div>
  <div class="card-body">
    <table class="table table-sm">
      <thead><tr><th>Claim #</th><th>Sale</th><th>Status</th><th>Description</th></tr></thead>
      <tbody>
        {% for c in claims %}
        <tr><td>{{ c.claim_number }}</td><td>{{ c.sale_id }}</td><td>{{ c.status }}</td><td>{{ c.description or '' }}</td></tr>
        {% endfor %}
      </tbody>
    </table>
    <form method="POST" action="{{ url_for('unified_inventory.warranty_create') }}" class="mt-3">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="row">
        <div class="col"><input name="sale_id" type="number" class="form-control" placeholder="Sale ID" required></div>
        <div class="col"><input name="product_id" type="number" class="form-control" placeholder="Product ID" required></div>
        <div class="col"><input name="claim_type" class="form-control" placeholder="Type (repair/refund)"></div>
        <div class="col"><input name="description" class="form-control" placeholder="Description"></div>
        <div class="col"><button class="btn btn-success">Add</button></div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
