{% extends 'base.html' %}
{% block title %}إعدادات البريد{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="mb-3">
    <a href="{{ url_for('owner.dashboard') }}" class="btn btn-secondary">
      <i class="fas fa-arrow-right"></i> رجوع للوحة المالك
    </a>
    <a href="{{ url_for('owner.sms_settings') }}" class="btn btn-warning">
      <i class="fas fa-link"></i> الرسائل
    </a>
    <a href="{{ url_for('owner.whatsapp_settings') }}" class="btn btn-success">
      <i class="fas fa-link"></i> واتساب
    </a>
    <a href="{{ url_for('owner.notification_templates') }}" class="btn btn-info">
      <i class="fas fa-link"></i> القوالب
    </a>
  </div>
  <div class="card"><div class="card-header"><h3>إعدادات البريد الإلكتروني</h3></div><div class="card-body"><form method="post" action=""><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="row"><div class="col-md-6"><div class="form-group"><label>SMTP Server</label><input type="text" name="smtp_server" class="form-control" value="{{ settings.smtp_server or '' }}" placeholder="smtp.gmail.com"></div></div><div class="col-md-6"><div class="form-group"><label>SMTP Port</label><input type="number" name="smtp_port" class="form-control" value="{{ settings.smtp_port or 587 }}"></div></div></div><div class="row"><div class="col-md-6"><div class="form-group"><label>Username</label><input type="text" name="smtp_username" class="form-control" value="{{ settings.smtp_username or '' }}"></div></div><div class="col-md-6"><div class="form-group"><label>Password</label><input type="password" name="smtp_password" class="form-control" value="{{ settings.smtp_password or '' }}"></div></div></div><div class="row"><div class="col-md-6"><div class="form-group"><label>From Email</label><input type="email" name="email_from" class="form-control" value="{{ settings.email_from or '' }}"></div></div><div class="col-md-6"><div class="form-group"><div class="custom-control custom-switch mt-4"><input type="checkbox" class="custom-control-input" id="use_tls" name="smtp_use_tls" {% if settings.smtp_use_tls %}checked{% endif %}><label class="custom-control-label" for="use_tls">استخدام TLS</label></div></div></div></div><button type="submit" class="btn btn-success"><i class="fas fa-save"></i> حفظ</button></form></div></div></div>
{% endblock %}
