{% extends 'base.html' %}
{% block title %}استيراد وتصدير{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="mb-3">
    <a href="{{ url_for('owner.dashboard') }}" class="btn btn-secondary">
      <i class="fas fa-arrow-right"></i> رجوع للوحة المالك
    </a>
  </div>
  <div class="card">
    <div class="card-header">
      <h3><i class="fas fa-file-export"></i> أدوات الاستيراد والتصدير</h3>
    </div>
    <div class="card-body">
      <h5 class="mb-4">تصدير إلى Excel</h5>
      <div class="row">
        <div class="col-md-3">
          <a href="{{ url_for('owner.export_excel', table_name='customers') }}" class="btn btn-success btn-block btn-lg mb-3">
            <i class="fas fa-file-excel fa-2x mb-2"></i>
            <br>العملاء
          </a>
        </div>
        <div class="col-md-3">
          <a href="{{ url_for('owner.export_excel', table_name='products') }}" class="btn btn-success btn-block btn-lg mb-3">
            <i class="fas fa-file-excel fa-2x mb-2"></i>
            <br>المنتجات
          </a>
        </div>
        <div class="col-md-3">
          <a href="{{ url_for('owner.export_excel', table_name='sales') }}" class="btn btn-success btn-block btn-lg mb-3">
            <i class="fas fa-file-excel fa-2x mb-2"></i>
            <br>المبيعات
          </a>
        </div>
        <div class="col-md-3">
          <a href="{{ url_for('owner.export_excel', table_name='expenses') }}" class="btn btn-success btn-block btn-lg mb-3">
            <i class="fas fa-file-excel fa-2x mb-2"></i>
            <br>المصروفات
          </a>
        </div>
      </div>
      
      <div class="alert alert-info mt-4">
        <i class="fas fa-info-circle"></i>
        <strong>ملاحظة:</strong> سيتم تنزيل الملف بصيغة Excel (.xlsx) جاهز للفتح في Excel أو Google Sheets.
      </div>
    </div>
  </div>
</div>
{% endblock %}
