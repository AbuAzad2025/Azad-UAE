{% extends 'base.html' %}
{% block title %}إعدادات الضرائب{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="mb-3">
    <a href="{{ url_for('owner.dashboard') }}" class="btn btn-secondary">
      <i class="fas fa-arrow-right"></i> رجوع للوحة المالك
    </a>
    <a href="{{ url_for('owner.currency_settings') }}" class="btn btn-info">
      <i class="fas fa-dollar-sign"></i> العملات
    </a>
  </div>
  <div class="card">
    <div class="card-header">
      <h3><i class="fas fa-percent"></i> إعدادات الضرائب</h3>
    </div>
    <div class="card-body">
      <form method="post" action="">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div class="form-group">
          <label>معدل الضريبة الافتراضي (%)</label>
          <input type="number" 
                 name="default_tax_rate" 
                 class="form-control" 
                 value="{{ settings.default_tax_rate or 0 }}" 
                 step="0.01"
                 min="0"
                 max="100">
        </div>
        
        <div class="form-group">
          <div class="custom-control custom-switch">
            <input type="checkbox" 
                   class="custom-control-input" 
                   id="vat_enabled" 
                   name="vat_enabled" 
                   {% if settings.vat_enabled %}checked{% endif %}>
            <label class="custom-control-label" for="vat_enabled">
              تفعيل ضريبة القيمة المضافة (VAT)
            </label>
          </div>
        </div>
        
        <div class="form-group">
          <label>رقم التسجيل الضريبي (TRN)</label>
          <input type="text" 
                 name="vat_number" 
                 class="form-control" 
                 value="{{ settings.vat_number or '' }}"
                 placeholder="123456789012345">
        </div>
        
        <div class="form-group">
          <label>الرقم الضريبي</label>
          <input type="text" 
                 name="tax_id_number" 
                 class="form-control" 
                 value="{{ settings.tax_id_number or '' }}">
        </div>
        
        <button type="submit" class="btn btn-success btn-lg">
          <i class="fas fa-save"></i> حفظ
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
