{% extends 'base.html' %}
{% block title %}إضافة مصروف متقدم{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="card">
    <div class="card-header"><h3><i class="fas fa-plus"></i> إضافة مصروف متقدم</h3></div>
    <div class="card-body">
      <form class="needs-validation" method="post" action="">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" aria-label="csrf token">
        <div class="row">
          <div class="col-md-3">
            <div class="form-group">
              <label for="input_expense_date">التاريخ *</label>
              <input type="date" name="expense_date" class="form-control" required value="{{ today }}" id="input_expense_date" aria-label="expense date">
            </div>
          </div>
          <div class="col-md-3">
             <div class="form-group">
               <label>الفرع *</label>
               <select name="branch_id" class="form-control" required aria-label="اختر الفرع">
                 {% if current_user.is_super_admin() or current_user.is_owner %}
                    <option value="">-- عام --</option>
                    {% for branch in branches %}
                        <option value="{{ branch.id }}">{{ branch.name }}</option>
                    {% endfor %}
                 {% else %}
                    <option value="{{ current_user.branch_id }}" selected>{{ current_user.branch.name if current_user.branch else 'عام' }}</option>
                 {% endif %}
               </select>
             </div>
          </div>
          <div class="col-md-3">
            <div class="form-group">
              <label>الفئة *</label>
              <select name="category_id" class="form-control" required aria-label="category id">
                {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name_ar }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="col-md-3">
            <div class="form-group">
              <label for="input_amount">المبلغ *</label>
              <input type="number" name="amount" class="form-control" step="0.01" required id="input_amount" aria-label="amount">
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>البيان</label>
          <textarea name="description" class="form-control" rows="3" aria-label="description"></textarea>
        </div>
        <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> حفظ</button>
        {% if current_user.has_permission('view_ledger') %}
        <a href="{{ url_for('advanced_ledger.advanced_expenses') }}" class="btn btn-secondary"><i class="fas fa-times"></i> إلغاء</a>
        {% endif %}
      </form>
    </div>
  </div>
</div>
{% endblock %}
