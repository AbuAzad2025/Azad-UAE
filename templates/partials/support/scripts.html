    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js" integrity="sha384-UG8ao2jwOWB7/oDdObZc6ItJmwUkR/PfMyt9Qs5AwX7PsnYn1CRKCTWyncPTWvaS" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" integrity="sha384-nLoOnA/BDh8A/jxqtckg4DumuCGOBYUnNJLZdQz/zfYNp3wcjGSoWTAzgko06G/2" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js" integrity="sha384-3zSEDfvllQohrq0PHL1fOXJuC/jSOO34H46t6UQfobFOmxE5BpjjaIJY5F2/bMnU" crossorigin="anonymous"></script>
    
    <script>
        let selectedAmount = 0;
        let selectedMethod = '';
        let selectedCrypto = 'btc';
        let selectedPackage = '';
        let currentTab = 'purchase';
        const supportWhatsapp = "{{ developer_whatsapp_link }}";
        const supportWhatsappDisplay = "{{ developer_whatsapp or config.DEVELOPER_WHATSAPP or '+972562150193' }}";
        const supportEmail = "{{ developer_email or config.DEVELOPER_EMAIL }}";
        const supportBrand = "{{ developer_name_ar or developer_name or 'Azad Systems' }}";

        function buildSupportMessage(kind, amountOverride = null, recordId = '') {
            const amount = amountOverride || selectedAmount || document.getElementById('customAmount')?.value || document.getElementById('cardAmount')?.value || '';
            const packageLabel = selectedPackage || 'غير {{ t('محددة') }} بعد';
            const orderRef = recordId ? ` {{ t('رقم') }} {{ t('المرجع') }}: #${recordId}.` : '';

            switch (kind) {
                case 'buy_code':
                    return `{{ t('مرحباً') }} ${supportBrand}، {{ t('أريد') }} {{ t('Purchase') }} {{ t('Code') }} {{ t('المصدري') }} أو {{ t('تنفيذ') }} {{ t('تخصيص') }} {{ t('Specific_2') }} {{ t('للنظام') }}.${orderRef}`;
                case 'donation_help':
                    return `{{ t('مرحباً') }} ${supportBrand}، {{ t('أريد') }} {{ t('ال{{ t('تبرع') }}') }} أو {{ t('رعاية') }} {{ t('تطوير') }} {{ t('ميزة') }} في {{ t('System') }}. {{ t('Amount') }} {{ t('Expected') }}: ${amount || '{{ t('سأحدده') }} {{ t('معكم') }}'} {{ t('Dollar') }}.${orderRef}`;
                case 'payment_help':
                    return `{{ t('مرحباً') }} ${supportBrand}، {{ t('أحتاج') }} {{ t('مساعدة') }} في {{ t('إتمام') }} ${currentTab === 'purchase' ? '{{ t('Purchase') }} {{ t('System') }}' : '{{ t('ال{{ t('تبرع') }}') }}'}.${orderRef}`;
                case 'refund_help':
                    return `{{ t('مرحباً') }} ${supportBrand}، {{ t('أريد') }} {{ t('ال{{ t('استفسار') }}') }} عن {{ t('Status_2') }} {{ t('Payment') }} أو {{ t('استرداد') }}.${orderRef}`;
                case 'buy_system':
                default:
                    return `{{ t('مرحباً') }} ${supportBrand}، {{ t('أريد') }} {{ t('Purchase') }} {{ t('System') }}${currentTab === 'purchase' ? ` {{ t('والباقـة') }} {{ t('الحالية') }}: ${packageLabel}` : ''}. {{ t('Amount') }} {{ t('Expected') }}: ${amount || '{{ t('سأحدده') }} {{ t('معكم') }}'} {{ t('Dollar') }}.${orderRef}`;
            }
        }

        function buildSupportEmail(kind, amountOverride = null, recordId = '') {
            const message = buildSupportMessage(kind, amountOverride, recordId);
            const subjectMap = {
                buy_system: '{{ t('طلب') }} {{ t('Purchase') }} {{ t('System') }}',
                buy_code: '{{ t('طلب') }} {{ t('Purchase') }} {{ t('Code') }} أو {{ t('تخصيص') }}',
                donation_help: '{{ t('استفسار') }} {{ t('تبرع') }} أو {{ t('رعاية') }}',
                payment_help: '{{ t('مساعدة') }} في {{ t('إتمام') }} {{ t('Payment_2') }}',
                refund_help: '{{ t('استفسار') }} {{ t('استرداد') }} أو {{ t('Status_2') }} {{ t('Payment') }}'
            };
            const subject = `${subjectMap[kind] || '{{ t('استفسار') }}'} - ${supportBrand}`;
            const body = `${message}\n\n{{ t('Data_2') }} {{ t('التواصل') }}:\n{{ t('واتساب') }}: ${supportWhatsappDisplay}\n{{ t('Email_2') }}: ${supportEmail}`;
            return { subject, body };
        }

        function openWhatsApp(kind, amountOverride = null, recordId = '') {
            const message = buildSupportMessage(kind, amountOverride, recordId);
            window.open(`https://wa.me/${supportWhatsapp}?text=${encodeURIComponent(message)}`, '_blank');
        }

        function openSupportEmail(kind, amountOverride = null, recordId = '') {
            const payload = buildSupportEmail(kind, amountOverride, recordId);
            window.location.href = `mailto:${supportEmail}?subject=${encodeURIComponent(payload.subject)}&body=${encodeURIComponent(payload.body)}`;
        }

        function buildSupportStatusHtml(recordId, paymentAmount, label) {
            return `
                <div class="ic-57">
                    <p class="ic-58"><strong>{{ t('Status') }} {{ t('الحالية') }}:</strong> ${label}</p>
                    <p class="ic-58"><strong>{{ t('المرجع') }}:</strong> #${recordId || '—'}</p>
                    <p class="ic-59"><strong>{{ t('Amount') }}:</strong> $${paymentAmount || '—'}</p>
                </div>
                <div class="ic-60">
                    <div><i class="fas fa-check-circle ic-61"></i> عند {{ t('النجاح') }} {{ t('ستصلك') }} {{ t('Details') }} {{ t('واضحة') }} أو {{ t('Address_2') }} {{ t('Payment') }} {{ t('مباشر') }}.</div>
                    <div><i class="fas fa-hourglass-half ic-62"></i> عند {{ t('Review') }} {{ t('Manual_3') }} {{ t('يمكنك') }} {{ t('ال{{ t('متابعة') }}') }} {{ t('فوراً') }} مع {{ t('أزاد') }}.</div>
                    <div><i class="fas fa-undo-alt ic-63"></i> {{ t('لأي') }} {{ t('استرداد') }} أو {{ t('Reconciliation') }} {{ t('استخدم') }} {{ t('واتساب') }} أو {{ t('Email_2') }} {{ t('الرسمي') }}.</div>
                </div>
            `;
        }

        function escapeHtml(value) {
            const div = document.createElement('div');
            div.textContent = value || '';
            return div.innerHTML;
        }

        function showSupportAssistanceModal(title, introHtml, kind, amountOverride = null, recordId = '') {
            Swal.fire({
                icon: 'info',
                title,
                html: `
                    <div class="ic-64">
                        ${introHtml}
                        <div class="ic-65">
                            <p class="ic-66"><strong>{{ t('التواصل') }} {{ t('الرسمي') }} مع {{ t('أزاد') }}:</strong></p>
                            <p class="ic-67"><i class="fab fa-whatsapp ic-68"></i> ${supportWhatsappDisplay}</p>
                            <p class="ic-59"><i class="fas fa-envelope ic-69"></i> ${supportEmail}</p>
                        </div>
                    </div>
                `,
                confirmButtonText: '{{ t('فتح') }} {{ t('واتساب') }} {{ t('أزاد') }}',
                confirmButtonColor: '#25D366',
                showDenyButton: true,
                denyButtonText: '{{ t('Submit') }} {{ t('بريد') }}',
                showCancelButton: true,
                cancelButtonText: '{{ t('Close') }}'
            }).then((result) => {
                if (result.isConfirmed) {
                    openWhatsApp(kind, amountOverride, recordId);
                } else if (result.isDenied) {
                    openSupportEmail(kind, amountOverride, recordId);
                }
            });
        }
        
        // Check URL parameters on page load
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const tabParam = urlParams.get('tab');
            
            if (tabParam === 'donation') {
                // Switch to donation tab
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                document.getElementById('donation-tab').classList.add('active');
                
                // Update hero icon
                const heroIcon = document.querySelector('.hero-section .mb-4 i');
                heroIcon.className = 'fas fa-heart';
                heroIcon.style.color = '#e74c3c';
                
                currentTab = 'donation';
            }
        });
        
        // Switch between tabs
        function switchTab(tab, event) {
            currentTab = tab;
            
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            if (event && event.target) {
                event.target.classList.add('active');
            } else {
                // fallback
                document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
                    if ((tab === 'purchase' && idx === 0) || (tab === 'donation' && idx === 1)) {
                        btn.classList.add('active');
                    }
                });
            }
            
            // Update tab content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(tab + '-tab').classList.add('active');
            
            // Hide purchase payment methods when switching tabs
            const purchasePaymentMethods = document.getElementById('purchase-payment-methods');
            if (purchasePaymentMethods && tab !== 'purchase') {
                purchasePaymentMethods.style.display = 'none';
            }
            
            // Reset selected package when switching to donation
            if (tab === 'donation') {
                document.querySelectorAll('.package-card').forEach(card => {
                    card.classList.remove('active');
                });
                selectedPackage = null;
                selectedAmount = 0;
            }
            
            // Update hero icon
            const heroIcon = document.querySelector('.hero-section .mb-4 i');
            if (tab === 'purchase') {
                heroIcon.className = 'fas fa-shopping-cart';
                heroIcon.style.color = '#667eea';
            } else {
                heroIcon.className = 'fas fa-heart';
                heroIcon.style.color = '#e74c3c';
            }
        }
        
        // Select package
        function selectPackage(packageName, price, event) {
            selectedPackage = packageName;
            selectedAmount = price;
            
            // Update UI
            document.querySelectorAll('.package-card').forEach(card => {
                card.classList.remove('active');
            });
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            }
            
            // Update progress
            updateProgress('step-package', 'completed');
            updateProgress('step-payment', 'active');
            updateProgress('step-complete', '');
            
            // Show payment methods for purchase
            const purchasePaymentMethods = document.getElementById('purchase-payment-methods');
            if (purchasePaymentMethods) {
                purchasePaymentMethods.style.display = 'grid';
                
                // Scroll to payment methods
                setTimeout(() => {
                    purchasePaymentMethods.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            }
        }
        
        function updateProgress(stepId, status) {
            const step = document.getElementById(stepId);
            if (!step) return;
            
            step.className = 'step';
            if (status) {
                step.classList.add(status);
            }
        }
        
        function selectMethod(method, event) {
            // Hide all forms
            document.querySelectorAll('.donation-form').forEach(form => {
                form.classList.remove('active');
            });
            
            // Remove active class from all cards
            document.querySelectorAll('.payment-card').forEach(card => {
                card.classList.remove('active');
            });
            
            // Show selected form
            const selectedForm = document.getElementById(method + '-form');
            if (selectedForm) {
                selectedForm.classList.add('active');
                
                // Pre-fill amount ONLY if in purchase tab and package was selected
                if (currentTab === 'purchase' && selectedAmount > 0) {
                    if (method === 'card') {
                        const cardAmountInput = document.getElementById('cardAmount');
                        if (cardAmountInput) {
                            cardAmountInput.value = selectedAmount;
                        }
                    } else if (method === 'crypto') {
                        const customAmountInput = document.getElementById('customAmount');
                        if (customAmountInput) {
                            customAmountInput.value = selectedAmount;
                        }
                    }
                } else {
                    // Clear amount fields for donation
                    if (method === 'card') {
                        const cardAmountInput = document.getElementById('cardAmount');
                        if (cardAmountInput) {
                            cardAmountInput.value = '';
                        }
                    } else if (method === 'crypto') {
                        const customAmountInput = document.getElementById('customAmount');
                        if (customAmountInput) {
                            customAmountInput.value = '';
                        }
                    }
                }
                
                // Scroll to form
                selectedForm.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            
            // Add active class to selected card
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            }
            
            selectedMethod = method;
        }
        
        async function collectSupportContactData(title) {
            const { value: formValues } = await Swal.fire({
                title,
                html:
                    '<input id="swal-name" class="swal2-input" placeholder="{{ t('Name') }} {{ t('الكامل') }}">' +
                    '<input id="swal-email" class="swal2-input" placeholder="{{ t('Email_2') }} {{ t('Email_3') }}" type="email">' +
                    '<input id="swal-phone" class="swal2-input" placeholder="{{ t('رقم') }} {{ t('Mobile') }}" type="tel">' +
                    '<textarea id="swal-message" class="swal2-textarea" placeholder="' + (currentTab === 'purchase' ? '{{ t('Name_2') }} {{ t('Company') }} أو {{ t('Note') }} {{ t('Additional') }} ({{ t('Optional') }})' : '{{ t('رسالة') }} {{ t('قصيرة') }} ({{ t('Optional') }})') + '"></textarea>',
                focusConfirm: false,
                showCancelButton: true,
                cancelButtonText: '{{ t('Cancel') }}',
                confirmButtonText: '{{ t('متابعة') }}',
                preConfirm: () => ({
                    name: document.getElementById('swal-name').value.trim(),
                    email: document.getElementById('swal-email').value.trim(),
                    phone: document.getElementById('swal-phone').value.trim(),
                    extra: document.getElementById('swal-message').value.trim()
                })
            });

            if (!formValues) {
                return null;
            }

            if (currentTab === 'purchase' && (!formValues.name || !formValues.email)) {
                Swal.fire({
                    icon: 'error',
                    title: '{{ t('Error') }}',
                    text: '{{ t('Name') }} {{ t('و{{ t('Email_2') }}') }} {{ t('Email_3') }} {{ t('مطلوبان') }} {{ t('ل{{ t('Purchase') }}') }} {{ t('Plan') }}',
                    confirmButtonColor: '#667eea'
                });
                return null;
            }

            return formValues;
        }

        function selectAmount(amount, event) {
            selectedAmount = amount;
            
            // Remove active class from all buttons
            document.querySelectorAll('.amount-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Add active class to selected button
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            }
            
            // Clear custom amount
            document.getElementById('customAmount').value = '';
        }
        
        async function generateCryptoPayment() {
            // Get amount
            const customAmount = document.getElementById('customAmount').value;
            const paymentAmount = customAmount || selectedAmount;
            
            if (!paymentAmount || paymentAmount < 15) {
                Swal.fire({
                    icon: 'error',
                    title: '{{ t('Error') }}',
                    text: '{{ t('الحد') }} {{ t('الأدنى') }} {{ t('لل{{ t('تبرع') }}') }} هو $15',
                    confirmButtonColor: '#667eea'
                });
                return;
            }
            
            const cryptoType = document.getElementById('cryptoType').value;
            
            // Show loading
            Swal.fire({
                title: '{{ t('جاري') }} {{ t('Create') }} {{ t('Address_2') }} {{ t('Payment_2') }}...',
                html: '<i class="fas fa-spinner fa-spin fa-3x"></i>',
                showConfirmButton: false,
                allowOutsideClick: false
            });
            
            // {{ t('تحديد') }} {{ t('نوع') }} {{ t('المعاملة') }} {{ t('وال{{ t('Data_2') }}') }}
            let apiEndpoint = '';
            let requestData = {};
            
            // {{ t('Add') }} {{ t('Data_2') }} {{ t('المشترية') }} إذا كان {{ t('Purchase') }}
            if (currentTab === 'purchase') {
                if (!selectedPackage) {
                    Swal.fire({
                        icon: 'warning',
                        title: '{{ t('Alert_2') }}',
                        text: '{{ t('الرجاء') }} {{ t('Select') }} {{ t('Plan_2') }} {{ t('أولاً') }}',
                        confirmButtonColor: '#667eea'
                    });
                    return;
                }
                
                // {{ t('جلب') }} package_id من {{ t('Card_2') }} {{ t('{{ t('المحدد') }}ة') }}
                const packageCard = document.querySelector('.package-card.active');
                const packageId = packageCard ? packageCard.getAttribute('data-package-id') : null;
                
                if (!packageId) {
                    Swal.fire({
                        icon: 'error',
                        title: '{{ t('Error') }}',
                        text: 'لم يتم {{ t('التعرف') }} على {{ t('Plan') }} {{ t('{{ t('المحدد') }}ة') }}',
                        confirmButtonColor: '#667eea'
                    });
                    return;
                }
                
                const formValues = await collectSupportContactData('{{ t('Data_2') }} {{ t('Purchase') }} {{ t('Plan') }}');
                if (!formValues) {
                    Swal.close();
                    return;
                }
                
                apiEndpoint = '/payment-vault/api/purchase';
                requestData = {
                    package_id: parseInt(packageId),
                    customer_name: formValues.name,
                    customer_email: formValues.email,
                    customer_phone: formValues.phone || '',
                    company_name: formValues.extra || '',
                    payment_method: 'crypto',
                    amount_paid: paymentAmount,
                    currency: 'USD',
                    crypto_currency: cryptoType,
                    transaction_id: 'CRYPTO_' + Date.now(),
                    payment_details: {
                        crypto_type: cryptoType,
                        amount: paymentAmount
                    }
                };
            } else {
                // {{ t('Data_2') }} {{ t('ال{{ t('تبرع') }}') }} ({{ t('{{ t('Optional') }}ة') }})
                const formValues = await collectSupportContactData('{{ t('Data_2') }} {{ t('ال{{ t('تبرع') }}') }}');
                if (!formValues) {
                    Swal.close();
                    return;
                }
                
                apiEndpoint = '/payment-vault/api/donation';
                requestData = {
                    amount: paymentAmount,
                    payment_method: 'crypto',
                    crypto_type: cryptoType,
                    crypto_currency: cryptoType,
                    donor_name: formValues.name || null,
                    donor_email: formValues.email || null,
                    message: formValues.extra || null,
                    transaction_id: 'DONATION_' + Date.now()
                };
            }
            
            // Create payment via API
            fetch(apiEndpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestData)
            })
            .then(response => response.json())
            .then(data => {
                Swal.close();
                
                if (data.success) {
                    const recordId = data.purchase_id || data.donation_id;
                    const recordType = data.purchase_id ? '{{ t('Purchase') }}' : '{{ t('تبرع') }}';
                    const paymentUrlButton = data.payment_url
                        ? `<a href="${data.payment_url}" target="_blank" rel="noopener noreferrer" class="btn btn-primary mt-2">
                                <i class="fas fa-external-link-alt"></i> {{ t('فتح') }} {{ t('صفحة') }} {{ t('Payment_2') }}
                           </a>`
                        : '';
                    
                    if (data.payment_address) {
                        Swal.fire({
                            icon: 'success',
                            title: `تم {{ t('Create') }} ${recordType} {{ t('بنجاح') }}`,
                            html: `
                                <div class="ic-70">
                                    <p class="ic-71">${data.message}</p>
                                    <div class="ic-72">
                                        <p><strong>{{ t('رقم') }} {{ t('ال{{ t('طلب') }}') }}:</strong> #${recordId}</p>
                                        <p><strong>{{ t('Amount') }} {{ t('Required_2') }}:</strong> ${data.payment_amount || paymentAmount} ${data.crypto_currency || cryptoType.toUpperCase()}</p>
                                        <hr>
                                        <p><strong>{{ t('Address_2') }} {{ t('Payment_2') }}:</strong></p>
                                        <p class="ic-73">
                                            ${data.payment_address}
                                        </p>
                                        <button onclick="navigator.clipboard.writeText('${data.payment_address}')" class="btn btn-outline-primary mt-2">
                                            <i class="fas fa-copy"></i> {{ t('Backups_2') }} {{ t('Address') }}
                                        </button>
                                        ${paymentUrlButton}
                                    </div>
                                    <p class="ic-74">
                                        <i class="fas fa-info-circle"></i>
                                        {{ t('أرسل') }} {{ t('Amount') }} إلى {{ t('Address') }} {{ t('أعلاه') }} {{ t('وسيتم') }} {{ t('Confirm') }} {{ t('Status') }} {{ t('{{ t('تلقائي') }}اً') }}.
                                    </p>
                                        ${buildSupportStatusHtml(recordId, paymentAmount, '{{ t('ب{{ t('Waiting_2') }}') }} {{ t('{{ t('Transfer') }}ك') }} إلى {{ t('Address_2') }} {{ t('Payment_2') }}')}
                                </div>
                            `,
                            confirmButtonText: '{{ t('تم،') }} {{ t('سأ{{ t('Payment') }}') }} {{ t('الآن_2') }}',
                            confirmButtonColor: '#28a745',
                            showDenyButton: true,
                            denyButtonText: '{{ t('واتساب') }} {{ t('أزاد') }}',
                            showCancelButton: true,
                            cancelButtonText: '{{ t('راسلنا') }} {{ t('ب{{ t('Email_2') }}') }}',
                            width: 650,
                            allowOutsideClick: false
                        }).then((result) => {
                            if (result.isDenied) {
                                openWhatsApp('payment_help', paymentAmount, recordId);
                            } else if (result.dismiss === Swal.DismissReason.cancel) {
                                openSupportEmail('payment_help', paymentAmount, recordId);
                            }
                        });
                    } else {
                        Swal.fire({
                            icon: 'success',
                            title: 'تم {{ t('Save') }} {{ t('ال{{ t('طلب') }}') }} {{ t('بنجاح') }}',
                            html: `
                                <div class="ic-70">
                                    <p class="ic-75">${data.message}</p>
                                    <div class="ic-72">
                                        <p><strong>{{ t('رقم') }} {{ t('ال{{ t('طلب') }}') }}:</strong> #${recordId}</p>
                                        <p><strong>{{ t('Amount') }}:</strong> $${paymentAmount}</p>
                                        <p><strong>{{ t('طريقة') }} {{ t('Payment_2') }}:</strong> ${data.payment_method_display || cryptoType.toUpperCase()}</p>
                                    </div>
                                    ${buildSupportStatusHtml(recordId, paymentAmount, 'تم {{ t('تسجيل') }} {{ t('ال{{ t('طلب') }}') }} {{ t('ب{{ t('Waiting_2') }}') }} {{ t('ال{{ t('متابعة') }}') }} أو {{ t('Confirm_2') }}')}
                                </div>
                            `,
                            confirmButtonText: '{{ t('واتساب') }} {{ t('أزاد') }}',
                            confirmButtonColor: '#28a745',
                            showDenyButton: true,
                            denyButtonText: '{{ t('راسلنا') }} {{ t('ب{{ t('Email_2') }}') }}',
                            allowOutsideClick: false
                        }).then((result) => {
                            if (result.isConfirmed) {
                                openWhatsApp('payment_help', paymentAmount, recordId);
                            } else if (result.isDenied) {
                                openSupportEmail('payment_help', paymentAmount, recordId);
                            }
                        });
                    }
                } else {
                    showSupportAssistanceModal(
                        '{{ t('تعذر') }} {{ t('Create') }} {{ t('ال{{ t('طلب') }}') }}',
                        `<p>${escapeHtml(data.error || '{{ t('حدث') }} {{ t('Error') }} {{ t('أثناء') }} {{ t('Create') }} {{ t('ال{{ t('طلب') }}') }}.')}</p><p>{{ t('يمكنك') }} {{ t('إعادة') }} {{ t('المحاولة') }} أو {{ t('إكمال') }} {{ t('العملية') }} {{ t('{{ t('مباشر') }}ة') }} مع {{ t('Company_2') }} {{ t('أزاد') }}.</p>`,
                        'payment_help',
                        paymentAmount
                    );
                }
            })
            .catch(error => {
                Swal.close();
