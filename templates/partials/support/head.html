<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>دعم المشروع - Support Azad Systems</title>
    
    
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/brand/azad/favicons/favicon.png') }}">
    
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.rtl.min.css">
    
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" integrity="sha384-cPX4+t0Da407ff76kkpJq7Tm1b+IZ2+iwi6hAcAf6lIJF/FKq5t1cW0j4I91dWwt" crossorigin="anonymous" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/accessibility.css') }}">
    
    <style>
        * {
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }
        
        .support-container {
            max-width: 1160px;
            margin: 0 auto;
        }
        
        .hero-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 42px 26px 32px;
            text-align: center;
            margin-bottom: 24px;
            box-shadow: 0 18px 44px rgba(31, 41, 55, 0.18);
            position: relative;
            overflow: hidden;
        }
        
        .hero-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102,126,234,0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero-kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(102,126,234,0.12);
            color: #4c51bf;
            font-weight: 800;
            font-size: 0.95rem;
            margin-bottom: 16px;
        }
        
        .hero-title {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            line-height: 1.2;
        }
        
        .hero-subtitle {
            font-size: 1.16rem;
            color: #555;
            margin: 0 auto 24px;
            max-width: 760px;
            line-height: 1.9;
        }

        .hero-summary-card {
            background: rgba(102,126,234,0.08);
            padding: 18px 20px;
            border-radius: 18px;
            margin: 0 auto 22px;
            border-right: 4px solid #667eea;
            max-width: 940px;
            text-align: right;
        }

        .hero-summary-card h4 {
            color: #667eea;
            margin-bottom: 14px;
            font-size: 1.05rem;
            font-weight: 900;
        }

        .hero-summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .hero-summary-item {
            background: rgba(255,255,255,0.78);
            border: 1px solid rgba(102,126,234,0.10);
            border-radius: 14px;
            padding: 12px 14px;
            text-align: right;
            font-weight: 700;
            color: #374151;
        }

        .hero-summary-item i {
            color: #22c55e;
            margin-left: 8px;
        }

        .quick-contact-strip {
            background: linear-gradient(135deg, rgba(15,23,42,0.96) 0%, rgba(88,28,135,0.94) 100%);
            color: white;
            border-radius: 22px;
            padding: 22px;
            margin: 0 0 22px;
            box-shadow: 0 16px 34px rgba(15,23,42,0.20);
            text-align: right;
        }

        .quick-contact-strip p {
            margin-bottom: 0;
        }

        .quick-contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin-top: 16px;
        }

        .quick-contact-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 18px;
            padding: 16px;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }

        .quick-contact-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 26px rgba(15,23,42,0.18);
            border-color: rgba(255,255,255,0.28);
        }

        .quick-contact-card h5 {
            margin: 12px 0 8px;
            font-size: 1.1rem;
            font-weight: 800;
        }

        .quick-contact-card p {
            margin: 0;
            color: rgba(255,255,255,0.85);
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .quick-contact-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        .quick-contact-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            border-radius: 999px;
            padding: 13px 22px;
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            min-height: 46px;
            min-width: 158px;
            box-shadow: 0 10px 22px rgba(15,23,42,0.14);
        }

        .quick-contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 26px rgba(15,23,42,0.18);
            opacity: 0.96;
            text-decoration: none;
        }

        .quick-contact-btn.whatsapp {
            background: #25D366;
            color: white;
        }

        .quick-contact-btn.email {
            background: #667eea;
            color: white;
        }

        .quick-contact-btn.dark {
            background: #111827;
            color: white;
        }
        
        .tab-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .tab-section-label {
            margin: 4px 0 14px;
            color: #64748b;
            font-size: 0.98rem;
            font-weight: 700;
        }
        
        .tab-btn {
            padding: 14px 28px;
            font-size: 1.05rem;
            font-weight: 700;
            border: 3px solid #e0e0e0;
            border-radius: 18px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 220px;
        }
        
        .tab-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .package-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .package-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border: 3px solid transparent;
        }
        
        .package-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            border-color: #667eea;
        }
        
        .package-card.active {
            border-color: #28a745;
            background: linear-gradient(135deg, rgba(40,167,69,0.05) 0%, rgba(32,201,151,0.05) 100%);
            position: relative;
        }
        
        .package-card.active::after {
            content: '✓ محدد';
            position: absolute;
            top: 10px;
            left: 10px;
            background: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
        }
        
        .package-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .package-price {
            font-size: 2.5rem;
            font-weight: 900;
            color: #333;
            margin-bottom: 20px;
        }
        
        .package-features {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            text-align: right;
        }
        
        .package-features li {
            padding: 8px 0;
            color: #666;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .package-features li:last-child {
            border-bottom: none;
        }
        
        .package-features i {
            color: #28a745;
            margin-left: 8px;
        }
        
        .crypto-badge {
            display: inline-block;
            padding: 9px 16px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 30px;
            font-weight: 700;
            margin: 4px;
            animation: float 3s ease-in-out infinite;
            font-size: 0.92rem;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .payment-methods {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        .status-card {
            background: white;
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 10px 22px rgba(15,23,42,0.08);
            border-top: 4px solid #667eea;
            text-align: right;
        }

        .status-card h5 {
            margin-bottom: 8px;
            font-size: 1rem;
            font-weight: 800;
            color: #1f2937;
        }

        .status-card p {
            margin: 0;
            color: #6b7280;
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .status-card.success { border-top-color: #28a745; }
        .status-card.warning { border-top-color: #f59e0b; }
        .status-card.danger { border-top-color: #ef4444; }
        .status-card.info { border-top-color: #0ea5e9; }
        
        .payment-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(15,23,42,0.08);
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .payment-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }
        
        .payment-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            border-color: #667eea;
        }
        
        .payment-card.active {
            border-color: #28a745;
            background: linear-gradient(135deg, rgba(102,126,234,0.05) 0%, rgba(118,75,162,0.05) 100%);
            position: relative;
        }
        
        .payment-card.active::after {
            content: '✓';
            position: absolute;
            top: 10px;
            left: 10px;
            background: #28a745;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 900;
        }
        
        .payment-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .payment-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #333;
        }
        
        .payment-desc {
            color: #666;
            font-size: 0.95rem;
        }
        
        .donation-form {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: none;
        }
        
        .donation-form.active {
            display: block;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .amount-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .amount-btn {
            padding: 15px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 700;
            font-size: 1.1rem;
            position: relative;
            overflow: hidden;
        }
        
        .amount-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(102,126,234,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .amount-btn:hover {
            border-color: #667eea;
            background: rgba(102,126,234,0.05);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .amount-btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .amount-btn.active {
            border-color: #28a745;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(40,167,69,0.3);
        }
        
        .amount-btn.active::after {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 5px;
            background: white;
            color: #28a745;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 900;
        }
        
        .crypto-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-top: 30px;
        }
        
        .wallet-address {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.9rem;
            margin: 10px 0;
            position: relative;
        }
        
        .copy-btn {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.3);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .copy-btn:hover {
            background: rgba(255,255,255,0.5);
        }
        
        .qr-code {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            margin: 20px 0;
        }
        
        .btn-donate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-donate:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        
        .btn-donate:active {
            transform: translateY(0);
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25);
        }
        
        .payment-methods-header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.5s ease;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Progress indicator */
        .progress-steps {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 30px 0;
            padding: 20px;
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            flex: 1;
            max-width: 200px;
        }
        
        .step::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 60%;
            width: 100%;
            height: 3px;
            background: #e0e0e0;
            z-index: -1;
        }
        
        .step:last-child::after {
            display: none;
        }
        
        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        
        .step.active .step-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.2);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        
        .step.completed .step-number {
            background: #28a745;
            color: white;
        }
        
        .step.completed .step-number::before {
            content: '✓';
            font-size: 1.2rem;
        }
        
        .step-label {
            font-size: 0.85rem;
            color: #666;
            text-align: center;
        }
        
        .step.active .step-label {
            color: #667eea;
            font-weight: 700;
        }
        
        .security-badge {
            display: inline-block;
            padding: 8px 15px;
            background: rgba(40,167,69,0.1);
            color: #28a745;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin: 5px;
        }
        
        .login-link {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-decoration: none;
            color: #667eea;
            font-weight: 700;
            transition: all 0.3s;
            z-index: 1000;
        }
        
        .login-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            color: #764ba2;
            text-decoration: none;
        }

        .payment-badge-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        
        .features-list {
            text-align: right;
            margin: 30px 0;
        }
        
        .feature-item {
            padding: 15px;
            margin: 10px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            border-right: 4px solid #28a745;
        }
        
        .feature-item i {
            margin-left: 10px;
            color: #28a745;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .hero-section {
                padding: 28px 16px 22px;
                border-radius: 18px;
            }

            .hero-title {
                font-size: 2.1rem;
            }

            .hero-subtitle {
                font-size: 1rem;
                margin-bottom: 18px;
            }

            .hero-summary-card,
            .quick-contact-strip,
            .payment-card {
                padding: 16px;
            }

            .hero-summary-grid,
            .quick-contact-grid,
            .status-grid {
                grid-template-columns: 1fr;
            }

            .tab-buttons {
                gap: 10px;
            }

            .tab-btn {
                width: 100%;
                min-width: 0;
                border-radius: 16px;
                padding: 13px 18px;
            }

            .quick-contact-actions {
                flex-direction: column;
            }

            .quick-contact-btn {
                width: 100%;
            }

            .login-link {
                position: static;
                display: inline-flex;
                margin-bottom: 14px;
            }

            .progress-steps {
                gap: 10px;
            }

            .step {
                max-width: none;
            }

            .step::after {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                font-size: 1.8rem;
            }

            .hero-kicker {
                font-size: 0.85rem;
                padding: 8px 12px;
            }

            .crypto-badge {
                width: calc(50% - 8px);
                margin: 0;
                text-align: center;
            }

            .payment-badge-row {
                gap: 10px;
            }
        }
    
    /* D6: externalized inline styles */
    .ic-1 { font-size: 5rem; color: #667eea; }
    .ic-2 { margin: 0 0 10px; font-weight: 900; }
    .ic-3 { margin: 0; color: rgba(255,255,255,0.88); line-height: 1.9; }
    .ic-4 { font-size: 1.6rem; color: #facc15; }
    .ic-5 { font-size: 1.6rem; color: #60a5fa; }
    .ic-6 { font-size: 1.6rem; color: #fb7185; }
