<div class="modal fade" id="fxModal" tabindex="-1" role="dialog" aria-labelledby="fxModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered erp-modal-fx" role="document">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white py-2">
          <h6 class="modal-title" id="fxModalLabel"><i class="fas fa-coins mr-2"></i>أسعار الصرف (عرض فقط)</h6>
          <button type="button" class="close text-white" data-dismiss="modal" aria-label="إغلاق">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body p-0">
          <div class="table-responsive erp-modal-scroll">
            <table class="table table-sm table-striped table-hover text-center mb-0" id="fx-rates-table">
              <thead class="thead-dark">
                <tr>
                  <th class="text-right">العملة</th>
                  <th>القيمة</th>
                  <th class="text-muted small">مقابل USD</th>
                </tr>
              </thead>
              <tbody id="fx-rates-body">
                
              </tbody>
            </table>
          </div>
          <div class="p-2 bg-light border-top text-center">
            <small class="text-muted" id="fx-last-updated">
              <i class="fas fa-sync-alt mr-1"></i>اضغط للتحديث
            </small>
            <span id="fx-source-badge" class="badge badge-secondary ml-1 erp-fx-source-hidden"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="navbarCalculatorModal" tabindex="-1" role="dialog" aria-labelledby="navbarCalculatorTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="navbarCalculatorTitle"><i class="fas fa-calculator mr-2"></i>الآلة الحاسبة</h5>
          <button type="button" class="close ml-0 mr-auto" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <ul class="nav nav-pills mb-3" id="calcTabs" role="tablist">
            <li class="nav-item"><a class="nav-link active" id="tab-classic" data-toggle="pill" href="#calc-classic" role="tab">كلاسيكية</a></li>
            <li class="nav-item"><a class="nav-link" id="tab-financial" data-toggle="pill" href="#calc-financial" role="tab">مالية</a></li>
            <li class="nav-item"><a class="nav-link" id="tab-scientific" data-toggle="pill" href="#calc-scientific" role="tab">علمية</a></li>
          </ul>
          <div class="tab-content">
            <div class="tab-pane fade show active" id="calc-classic" role="tabpanel">
              <input id="calcDisplayClassic" class="form-control form-control-lg mb-2 text-right" type="text" readonly value="0" aria-label="calcDisplayClassic">
              <div id="calcClassicButtons" class="d-flex flex-wrap"></div>
            </div>
            <div class="tab-pane fade" id="calc-financial" role="tabpanel">
              <div class="row">
                <div class="col-md-6 mb-2">
                  <h6>قسط التمويل الشهري</h6>
                  <input class="form-control mb-2" id="loanPrincipal" type="number" placeholder="قيمة القرض">
                  <input class="form-control mb-2" id="loanRate" type="number" step="0.01" placeholder="الفائدة السنوية %">
                  <input class="form-control mb-2" id="loanMonths" type="number" placeholder="عدد الأشهر">
                  <button type="button" class="btn btn-primary" id="btnLoanCalc">احسب</button>
                  <div class="small text-muted mt-2" id="loanResult">--</div>
                </div>
                <div class="col-md-6 mb-2">
                  <h6>الربح والهامش</h6>
                  <input class="form-control mb-2" id="costValue" type="number" step="0.01" placeholder="التكلفة">
                  <input class="form-control mb-2" id="sellValue" type="number" step="0.01" placeholder="سعر البيع">
                  <button type="button" class="btn btn-success" id="btnMarginCalc">احسب</button>
                  <div class="small text-muted mt-2" id="marginResult">--</div>
                </div>
              </div>
            </div>
            <div class="tab-pane fade" id="calc-scientific" role="tabpanel">
              <input id="calcDisplayScientific" class="form-control form-control-lg mb-2 text-right" type="text" readonly value="0" aria-label="calcDisplayScientific">
              <div id="calcScientificButtons" class="d-flex flex-wrap"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
