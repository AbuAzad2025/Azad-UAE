{% extends 'layouts/base_pos.html' %}
{% block title %}{{ t('Customer Display') }}{% endblock %}
{% block content %}
<div class="container text-center text-white py-5" style="min-height:100vh">
  <div id="cdStatus" class="mb-4">
    <div class="display-1 mb-3"><i class="fas fa-spinner fa-pulse"></i></div>
    <h2 id="cdOrderNumber" class="mb-3">{{ t('Waiting for Order') }}...</h2>
  </div>
  <div id="cdItems" class="row justify-content-center mb-4 d-none">
    <div class="col-md-6">
      <table class="table table-dark table-borderless text-right">
        <thead><tr><th>{{ t('Description') }}</th><th>{{ t('Qty') }}</th><th>{{ t('Amount') }}</th></tr></thead>
        <tbody id="cdItemsBody"></tbody>
      </table>
      <hr class="border-light">
      <h3 id="cdTotal" class="text-left"></h3>
    </div>
  </div>
  <div id="cdProgress" class="d-none">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="progress" style="height:30px">
          <div id="cdProgressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width:0"></div>
        </div>
        <p id="cdProgressLabel" class="mt-2 h4">{{ t('Pending') }}</p>
      </div>
    </div>
  </div>
  <p class="text-muted small mt-5">{{ t('Thank You') }}</p>
</div>
{% endblock %}
{% block extra_js %}
<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');
  const tenantId = params.get('tenant_id');
  if (!sessionId || !tenantId) { document.getElementById('cdOrderNumber').textContent = '{{ t("Invalid Link") }}'; return; }

  const es = new EventSource('/pos/api/customer-display/'+sessionId+'/stream?tenant_id='+encodeURIComponent(tenantId));
  es.onmessage = function(e) {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'order_update') updateDisplay(d);
    } catch(ex) {}
  };
  es.onerror = function() { es.close(); setTimeout(function(){window.location.reload()}, 5000); };

  function updateDisplay(d) {
    document.getElementById('cdStatus').classList.remove('d-none');
    document.getElementById('cdOrderNumber').textContent = '{{ t("Invoice") }} #' + (d.order_number||'');
    document.getElementById('cdItems').classList.remove('d-none');
    const tbody = document.getElementById('cdItemsBody');
    tbody.innerHTML = (d.items||[]).map(i => '<tr><td>'+i.name+'</td><td>'+i.quantity+'</td><td>'+i.total+'</td></tr>').join('');
    document.getElementById('cdTotal').textContent = '{{ t("Grand Total") }}: ' + (d.total||'0.00');
    document.getElementById('cdProgress').classList.remove('d-none');
    const pct = {pending:'25%',preparing:'50%',ready:'75%',served:'100%'}[d.status]||'0%';
    const label = {pending:'{{ t("Pending") }}',preparing:'{{ t("Preparing") }}',ready:'{{ t("Ready") }}',served:'{{ t("Served") }}'}[d.status]||'';
    document.getElementById('cdProgressBar').style.width = pct;
    document.getElementById('cdProgressLabel').textContent = label;
  }
})();
</script>
{% endblock %}
