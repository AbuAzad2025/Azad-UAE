{% extends 'base.html' %}
{% block title %}تعديل الفرع{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="card">
    <div class="card-header">
      <h3><i class="fas fa-edit"></i> تعديل الفرع: {{ branch.name }}</h3>
    </div>
    <div class="card-body">
      <form class="needs-validation" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" aria-label="csrf token">
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label for="input_name">الاسم *</label>
              <input type="text" name="name" class="form-control" value="{{ branch.name }}" required id="input_name" aria-label="name" minlength="2" maxlength="100">
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label for="input_code">الكود *</label>
              <input type="text" name="code" class="form-control" value="{{ branch.code }}" required disabled id="input_code" aria-label="code">
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label for="input_city">المدينة</label>
              <input type="text" name="city" class="form-control" value="{{ branch.city }}" id="input_city" aria-label="city">
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label for="input_phone">رقم الهاتف</label>
              <input type="text" name="phone" class="form-control" value="{{ branch.phone }}" id="input_phone" aria-label="phone" pattern="^\+?[0-9\s\-]{8,20}$">
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>العنوان</label>
          <textarea name="address" class="form-control" aria-label="address" maxlength="255">{{ branch.address }}</textarea>
        </div>
        <div class="form-group form-check">
          <input type="checkbox" name="is_main" class="form-check-input" id="isMain" {% if branch.is_main %}checked{% endif %} aria-label="is main">
          <label class="form-check-label" for="isMain">هذا هو الفرع الرئيسي</label>
        </div>
        <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> حفظ</button>
        <a href="{{ url_for('branches.index') }}" class="btn btn-secondary"><i class="fas fa-times"></i> إلغاء</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
