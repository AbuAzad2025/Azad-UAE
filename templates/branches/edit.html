{% extends 'base.html' %}
{% block title %}{{ t('Edit') }} {{ t('Branch') }}{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="card">
    <div class="card-header">
      <h3><i class="fas fa-edit"></i> {{ t('Edit') }} {{ t('Branch') }}: {{ branch.name }}</h3>
    </div>
    <div class="card-body">
      <form class="needs-validation" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" aria-label="csrf token">
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label for="input_name">{{ t('Name') }} *</label>
              <input type="text" name="name" class="form-control" value="{{ branch.name }}" required id="input_name" aria-label="name" minlength="2" maxlength="100">
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label for="input_code">{{ t('Code') }} *</label>
              <input type="text" name="code" class="form-control" value="{{ branch.code }}" required disabled id="input_code" aria-label="code">
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label for="input_city">{{ t('Receivables') }}</label>
              <input type="text" name="city" class="form-control" value="{{ branch.city }}" id="input_city" aria-label="city">
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label for="input_phone">{{ t('رقم') }} {{ t('Phone') }}</label>
              <input type="text" name="phone" class="form-control" value="{{ branch.phone }}" id="input_phone" aria-label="phone" pattern="^\+?[0-9\s\-]{8,20}$">
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label for="prices_include_vat">طريقة احتساب الضريبة في {{ t('Branch') }}</label>
              <select name="prices_include_vat" class="form-control" id="prices_include_vat" aria-label="prices include vat">
                <option value="" {% if branch.prices_include_vat is none %}selected{% endif %}>الافتراضي (حسب الشركة)</option>
                <option value="on" {% if branch.prices_include_vat is true %}selected{% endif %}>الأسعار شاملة الضريبة</option>
                <option value="off" {% if branch.prices_include_vat is false %}selected{% endif %}>الأسعار غير شاملة الضريبة</option>
              </select>
              <small class="text-muted">إذا اخترت "الافتراضي"، سيتم استخدام إعداد الشركة.</small>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label for="branch_address">{{ t('Address') }}</label>
          <textarea name="address" class="form-control" id="branch_address" maxlength="255">{{ branch.address }}</textarea>
        </div>
        <div class="form-group form-check">
          <input type="checkbox" name="is_main" class="form-check-input" id="isMain" {% if branch.is_main %}checked{% endif %} aria-label="is main">
          <label class="form-check-label" for="isMain">هذا هو {{ t('Branch') }} {{ t('Main') }}</label>
        </div>
        <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> {{ t('Save') }}</button>
        <a href="{{ url_for('branches.index') }}" class="btn btn-secondary"><i class="fas fa-times"></i> {{ t('Cancel') }}</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
