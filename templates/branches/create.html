{% extends 'base.html' %}
{% block title %}{{ t('Add') }} {{ t('Branch_2') }}{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="card">
    <div class="card-header">
      <h3><i class="fas fa-plus"></i> {{ t('Add') }} {{ t('Branch_2') }} {{ t('New') }}</h3>
    </div>
    <div class="card-body">
      <form class="needs-validation" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" aria-label="csrf token">
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label for="input_name">{{ t('Name') }} *</label>
              <input type="text" name="name" class="form-control" required id="input_name" aria-label="name" minlength="2" maxlength="100">
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label for="input_code">{{ t('Code') }} ({{ t('مثال') }}: HQ, HEB) *</label>
              <input type="text" name="code" class="form-control" required id="input_code" aria-label="code">
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label for="input_city">{{ t('Receivables') }}</label>
              <input type="text" name="city" class="form-control" id="input_city" aria-label="city">
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label for="input_phone">{{ t('رقم') }} {{ t('Phone') }}</label>
              <input type="text" name="phone" class="form-control" id="input_phone" aria-label="phone" pattern="^\+?[0-9\s\-]{8,20}$">
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>{{ t('Address') }}</label>
          <textarea name="address" class="form-control" aria-label="address" maxlength="255"></textarea>
        </div>
        <div class="form-group form-check">
          <input type="checkbox" name="is_main" class="form-check-input" id="isMain" aria-label="is main">
          <label class="form-check-label" for="isMain">هذا هو {{ t('Branch') }} {{ t('Main') }}</label>
        </div>
        <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> {{ t('Save') }}</button>
        <a href="{{ url_for('branches.index') }}" class="btn btn-secondary"><i class="fas fa-times"></i> {{ t('Cancel') }}</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
