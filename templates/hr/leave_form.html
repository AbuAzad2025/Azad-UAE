{% extends 'base.html' %}
{% block title %}{{ t('طلب') }} {{ t('إجازة') }}{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="card">
    <div class="card-header"><h5><i class="fas fa-calendar-plus"></i> {{ t('طلب') }} {{ t('إجازة') }}</h5></div>
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row">
          <div class="col-md-6">
            <div class="form-group"><label>{{ t('نوع') }} {{ t('ال{{ t('إجازة') }}') }} <span class="text-danger">*</span></label>
              <select name="leave_type_id" class="form-control" required>
                {% for lt in leave_types %}
                <option value="{{ lt.id }}">{{ lt.name_ar or lt.name }}</option>
                {% endfor %}
              </select></div>
          </div>
          <div class="col-md-3">
            <div class="form-group"><label>من {{ t('History') }}</label>
              <input name="date_from" type="date" class="form-control" required></div>
          </div>
          <div class="col-md-3">
            <div class="form-group"><label>إلى {{ t('History') }}</label>
              <input name="date_to" type="date" class="form-control" required></div>
          </div>
          <div class="col-12">
            <div class="form-group"><label>{{ t('السبب') }}</label>
              <textarea name="reason" class="form-control" rows="3"></textarea></div>
          </div>
        </div>
        <button type="submit" class="btn btn-success"><i class="fas fa-paper-plane"></i> {{ t('Submit') }} {{ t('ال{{ t('طلب') }}') }}</button>
        <a href="{{ url_for('hr.leaves_list') }}" class="btn btn-secondary">{{ t('Cancel') }}</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
