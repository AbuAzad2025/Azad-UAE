{% extends 'base.html' %}
{% block title %}{{ t('Settings_2') }} {{ t('Printing') }}{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="card">
    <div class="card-header">
      <h3 class="card-title mb-0"><i class="fas fa-print ml-2"></i>{{ t('Settings_2') }} {{ t('Printing') }}</h3>
    </div>
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row">
          <div class="col-md-6">
            <h5 class="mb-3">📄 {{ t('Settings_2') }} {{ t('الورق') }}</h5>
            <div class="form-group">
              <label for="paper_size">{{ t('حجم') }} {{ t('الورق') }}</label>
              <select name="paper_size" id="paper_size" class="form-control">
                <option value="A4" {{ 'selected' if settings.paper_size == 'A4' }}>A4</option>
                <option value="A5" {{ 'selected' if settings.paper_size == 'A5' }}>A5</option>
                <option value="Letter" {{ 'selected' if settings.paper_size == 'Letter' }}>Letter</option>
              </select>
            </div>
            <div class="form-group">
              <label for="orientation">{{ t('اتجاه') }} {{ t('Printing') }}</label>
              <select name="orientation" id="orientation" class="form-control">
                <option value="portrait" {{ 'selected' if settings.orientation == 'portrait' }}>{{ t('عمودي') }}</option>
                <option value="landscape" {{ 'selected' if settings.orientation == 'landscape' }}>{{ t('أفقي') }}</option>
              </select>
            </div>
            <div class="form-group">
              <label for="active_template">{{ t('القالب') }} {{ t('Active_5') }}</label>
              <select name="active_template" id="active_template" class="form-control">
                <option value="modern" {{ 'selected' if settings.active_template == 'modern' }}>{{ t('حديث') }}</option>
                <option value="classic" {{ 'selected' if settings.active_template == 'classic' }}>{{ t('كلاسيكي') }}</option>
                <option value="gulf" {{ 'selected' if settings.active_template == 'gulf' }}>{{ t('Gulf_2') }}</option>
                <option value="simple" {{ 'selected' if settings.active_template == 'simple' }}>{{ t('بسيط') }}</option>
                <option value="minimal" {{ 'selected' if settings.active_template == 'minimal' }}>{{ t('أقلية') }}</option>
              </select>
            </div>
          </div>
          <div class="col-md-6">
            <h5 class="mb-3">🎨 {{ t('الألوان') }}</h5>
            <div class="form-group">
              <label for="header_color">{{ t('لون') }} {{ t('الترويسة') }}</label>
              <input type="color" name="header_color" id="header_color" class="form-control form-control-color" value="{{ settings.header_color or '#667eea' }}" style="height:50px;">
            </div>
            <div class="form-group">
              <label for="accent_color">{{ t('اللون') }} {{ t('الثانوي') }}</label>
              <input type="color" name="accent_color" id="accent_color" class="form-control form-control-color" value="{{ settings.accent_color or '#764ba2' }}" style="height:50px;">
            </div>
          </div>
        </div>

        <hr>
        <h5 class="mb-3">⚙️ {{ t('خيارات') }} {{ t('Printing') }}</h5>
        <div class="row">
          <div class="col-md-4">
            <div class="custom-control custom-switch">
              <input type="checkbox" class="custom-control-input" id="show_logo" name="show_logo" {{ 'checked' if settings.show_logo }}>
              <label class="custom-control-label" for="show_logo">{{ t('Show') }} {{ t('الشعار') }}</label>
            </div>
          </div>
          <div class="col-md-4">
            <div class="custom-control custom-switch">
              <input type="checkbox" class="custom-control-input" id="enable_qr_code" name="enable_qr_code" {{ 'checked' if settings.enable_qr_code }}>
              <label class="custom-control-label" for="enable_qr_code">{{ t('Code_3') }} QR</label>
            </div>
          </div>
          <div class="col-md-4">
            <div class="custom-control custom-switch">
              <input type="checkbox" class="custom-control-input" id="enable_watermark" name="enable_watermark" {{ 'checked' if settings.enable_watermark }}>
              <label class="custom-control-label" for="enable_watermark">{{ t('علامة') }} {{ t('مائية') }}</label>
            </div>
          </div>
          <div class="col-md-4 mt-3">
            <div class="custom-control custom-switch">
              <input type="checkbox" class="custom-control-input" id="show_terms" name="show_terms" {{ 'checked' if settings.show_terms }}>
              <label class="custom-control-label" for="show_terms">{{ t('Show') }} {{ t('الشروط') }} {{ t('والأحكام') }}</label>
            </div>
          </div>
        </div>

        <hr>
        <div class="text-center">
          <button type="submit" class="btn btn-primary btn-lg px-5">
            <i class="fas fa-save ml-2"></i> {{ t('Save') }} {{ t('Settings') }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
