{% extends 'shop/base.html' %}
{% block title %}{{ t('register') }} — {{ store.title }}{% endblock %}
{% block content %}
<div class="ps-panel" style="max-width:480px;margin:2rem auto;">
  <h2 style="margin:0 0 1rem;font-weight:800;">{{ t('register') }}</h2>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="ps-hp" aria-hidden="true"><input type="text" name="website" tabindex="-1"></div>
    <div class="ps-form-group"><label>{{ t('name') }} *</label><input type="text" name="name" required minlength="2"></div>
    <div class="ps-form-group"><label>{{ t('email') }} *</label><input type="email" name="email" required dir="ltr"></div>
    <div class="ps-form-group"><label>{{ t('phone') }} *</label><input type="tel" name="phone" required></div>
    <div class="ps-form-group"><label>{{ t('address') }}</label><textarea name="address" rows="2"></textarea></div>
    <div class="ps-form-group"><label>{{ t('password') }} *</label><input type="password" name="password" required minlength="6" autocomplete="new-password"></div>
    <button type="submit" class="ps-btn ps-btn-primary ps-btn-block">{{ t('register') }}</button>
  </form>
  <p style="margin-top:1rem;text-align:center;"><a href="{{ url_for('shop.account_login', slug=store.store_slug) }}">{{ t('login') }}</a></p>
</div>
{% endblock %}
