{% extends 'shop/base.html' %}
{% block title %}{{ t('register') }} — {{ store.title }}{% endblock %}
<style>
    /* D6: externalized inline styles */
    .ic-1 { max-width:480px; margin:2rem auto; }
    .ic-2 { margin:0 0 1rem; font-weight:800; }
    .ic-3 { margin-top:1rem; text-align:center; }
</style>

{% block content %}
{% with current_page_name = t('register') %}
{% include 'shop/partials/breadcrumbs.html' with context %}
{% endwith %}
<div class="ps-panel ic-1">
  <h2 class="ic-2">{{ t('register') }}</h2>
  <form class="needs-validation" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" aria-label="csrf token">
    <div class="ps-hp" aria-hidden="true"><input type="text" name="website" tabindex="-1" aria-label="website"></div>
    <div class="ps-form-group"><label for="reg_name">{{ t('name') }} *</label><input type="text" id="reg_name" name="name" required minlength="2" aria-label="name" maxlength="100"></div>
    <div class="ps-form-group"><label for="reg_email">{{ t('email') }} *</label><input type="email" id="reg_email" name="email" required dir="ltr" aria-label="email"></div>
    <div class="ps-form-group"><label for="reg_phone">{{ t('phone') }} *</label><input type="tel" id="reg_phone" name="phone" required aria-label="phone" pattern="^\+?[0-9\s\-]{8,20}$"></div>
    <div class="ps-form-group"><label for="reg_address">{{ t('address') }}</label><textarea id="reg_address" name="address" rows="2" aria-label="address" maxlength="255"></textarea></div>
    <div class="ps-form-group"><label for="reg_password">{{ t('password') }} *</label><input type="password" id="reg_password" name="password" required minlength="6" autocomplete="new-password" aria-label="password"></div>
    <button type="submit" class="ps-btn ps-btn-primary ps-btn-block">{{ t('register') }}</button>
  </form>
  <p class="ic-3"><a href="{{ url_for('shop.account_login', slug=store.store_slug) }}">{{ t('login') }}</a></p>
</div>
{% endblock %}
