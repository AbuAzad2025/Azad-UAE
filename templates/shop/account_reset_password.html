{% extends 'shop/base.html' %}

{% block title %}{{ t('reset_password') }} — {{ store.title }}{% endblock %}



{% block content %}

<div class="ps-panel" style="max-width:420px;margin:2rem auto;">

  <h2 class="ps-page-title">{{ t('reset_password') }}</h2>

  <form class="needs-validation" method="post">

    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" aria-label="csrf token">

    <div class="ps-form-group">

      <label for="password">{{ t('new_password') }}</label>

      <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password" aria-label="password">

    </div>

    <button type="submit" class="ps-btn ps-btn-primary ps-btn-block">{{ t('reset_password') }}</button>

  </form>

</div>

{% endblock %}
