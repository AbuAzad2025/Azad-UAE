{% extends 'shop/base.html' %}

{% block title %}{{ t('forgot_password') }} — {{ store.title }}{% endblock %}



<style>
    /* D6: externalized inline styles */
    .ic-1 { max-width:420px; margin:2rem auto; }
    .ic-2 { margin-top:1rem; font-size:0.88rem; }
</style>

{% block content %}

<div class="ps-panel ic-1">

  <h2 class="ps-page-title">{{ t('forgot_password') }}</h2>

  <form method="post">

    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" aria-label="csrf token">

    <div class="ps-form-group">

      <label for="email">{{ t('email') }}</label>

      <input type="email" id="email" name="email" required autocomplete="email" aria-label="email">

    </div>

    <button type="submit" class="ps-btn ps-btn-primary ps-btn-block">{{ t('send_reset_link') }}</button>

  </form>

  <p class="ic-2"><a href="{{ url_for('shop.account_login', slug=store.store_slug) }}">{{ t('login') }}</a></p>

</div>

{% endblock %}
