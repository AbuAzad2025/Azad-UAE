{% extends 'shop/base.html' %}
{% block title %}{{ t('login') }} — {{ store.title }}{% endblock %}
<style>
    /* D6: externalized inline styles */
    .ic-1 { max-width:420px; margin:2rem auto; }
    .ic-2 { margin:0 0 1rem; font-weight:800; }
    .ic-3 { margin-top:0.75rem; text-align:center; font-size:0.85rem; }
    .ic-4 { margin-top:0.75rem; text-align:center; font-size:0.9rem; }
    .ic-5 { color:var(--ps-green-dark); font-weight:700; }
</style>

{% block content %}
<div class="ps-panel ic-1">
  <h2 class="ic-2">{{ t('login') }}</h2>
  <p class="ps-card-meta">{{ t('login_required') }}</p>
  <form class="needs-validation" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" aria-label="csrf token">
    {% if next_url %}<input type="hidden" name="next" value="{{ next_url }}" aria-label="next">{% endif %}
    <div class="ps-form-group">
      <label for="login_email">{{ t('email') }}</label>
      <input type="email" id="login_email" name="email" required autocomplete="email" dir="ltr" aria-label="email">
    </div>
    <div class="ps-form-group">
      <label for="login_password">{{ t('password') }}</label>
      <input type="password" id="login_password" name="password" required minlength="6" autocomplete="current-password" aria-label="password">
    </div>
    <button type="submit" class="ps-btn ps-btn-primary ps-btn-block">{{ t('login') }}</button>
  </form>
  <p class="ic-3">
    <a href="{{ url_for('shop.account_forgot_password', slug=store.store_slug) }}">{{ t('forgot_password') }}</a>
  </p>
  <p class="ic-4">
    {{ t('register') }}؟ <a href="{{ url_for('shop.account_register', slug=store.store_slug) }}" class="ic-5">{{ t('register') }}</a>
  </p>
</div>
{% endblock %}
