{% extends 'shop/base.html' %}
{% block title %}{{ t('login') }} — {{ store.title }}{% endblock %}
{% block content %}
<div class="ps-panel" style="max-width:420px;margin:2rem auto;">
  <h2 style="margin:0 0 1rem;font-weight:800;">{{ t('login') }}</h2>
  <p class="ps-card-meta">{{ t('login_required') }}</p>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    {% if next_url %}<input type="hidden" name="next" value="{{ next_url }}">{% endif %}
    <div class="ps-form-group">
      <label>{{ t('email') }}</label>
      <input type="email" name="email" required autocomplete="email" dir="ltr">
    </div>
    <div class="ps-form-group">
      <label>كلمة المرور / Password</label>
      <input type="password" name="password" required minlength="6" autocomplete="current-password">
    </div>
    <button type="submit" class="ps-btn ps-btn-primary ps-btn-block">{{ t('login') }}</button>
  </form>
  <p style="margin-top:0.75rem;text-align:center;font-size:0.85rem;">
    <a href="{{ url_for('shop.account_forgot_password', slug=store.store_slug) }}">{{ t('forgot_password') }}</a>
  </p>
  <p style="margin-top:0.75rem;text-align:center;font-size:0.9rem;">
    {{ t('register') }}؟ <a href="{{ url_for('shop.account_register', slug=store.store_slug) }}" style="color:var(--ps-green-dark);font-weight:700;">{{ t('register') }}</a>
  </p>
</div>
{% endblock %}
