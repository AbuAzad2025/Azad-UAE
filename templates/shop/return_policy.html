{% extends 'shop/base.html' %}

{% block title %}{{ t('return_policy') }} — {{ store.title }}{% endblock %}



{% block content %}

<div class="ps-panel">

  <h2 class="ps-page-title">{{ t('return_policy') }}</h2>

  <div class="ps-policy-body" style="white-space:pre-wrap;line-height:1.75;color:var(--ps-muted);">{{ policy }}</div>

  <a href="{{ url_for('shop.catalog', slug=store.store_slug) }}" class="ps-btn ps-btn-outline" style="margin-top:1.25rem;">{{ t('continue_shopping') }}</a>

</div>

{% endblock %}
