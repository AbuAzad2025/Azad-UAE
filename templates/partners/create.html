{% extends 'base.html' %}

{% block title %}إضافة شريك جديد{% endblock %}

{% block page_title %}
<h1 class="text-gradient mb-0"><i class="fas fa-user-plus mr-2"></i>إضافة شريك جديد</h1>
{% endblock %}

{% block content %}
<div class="row">
  <div class="col-lg-8">
    <form class="needs-validation" method="POST" class="card">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" aria-label="csrf token">
      <div class="card-header bg-primary text-white">
        <i class="fas fa-user-tie mr-2"></i>بيانات الشريك
      </div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">الاسم <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" required aria-label="name" minlength="2" maxlength="100">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold" for="input_name_en">الاسم الإنجليزي</label>
            <input type="text" name="name_en" class="form-control" id="input_name_en" aria-label="name en" minlength="2" maxlength="100">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold" for="input_code">الكود</label>
            <input type="text" name="code" class="form-control" placeholder="P001" id="input_code">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold" for="input_id_number">رقم الهوية</label>
            <input type="text" name="id_number" class="form-control" id="input_id_number" aria-label="id number">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">النوع</label>
            <select name="partner_type" class="form-select" aria-label="partner type">
              <option value="investor">شريك استثماري</option>
              <option value="working_partner">شريك عامل</option>
              <option value="silent_partner">شريك صامت</option>
              <option value="branch_partner">شريك فرع</option>
              <option value="warehouse_partner">شريك مستودع</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">مستوى الشراكة</label>
            <select name="scope_type" id="scope_type" class="form-select" onchange="updateScopeOptions()" aria-label="scope type">
              <option value="company">مستوى الشركة</option>
              <option value="branch">فرع محدد</option>
              <option value="warehouse">مستودع محدد</option>
            </select>
          </div>
          <div class="col-md-6" id="scope_id_container" class="d-none">
            <label class="form-label fw-semibold" id="scope_id_label">—</label>
            <select name="scope_id" id="scope_id" class="form-select" aria-label="scope id">
              <option value="">— اختر —</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label fw-semibold" for="input_investment_amount">رأس المال</label>
            <input type="number" name="investment_amount" class="form-control" value="0" step="0.01" id="input_investment_amount" aria-label="investment amount" min="0">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold" for="input_share_percentage">نسبة الربح %</label>
            <input type="number" name="share_percentage" class="form-control" value="0" step="0.01" max="100" id="input_share_percentage" aria-label="share percentage" min="0">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold" for="input_fixed_monthly_amount">مبلغ شهري ثابت</label>
            <input type="number" name="fixed_monthly_amount" class="form-control" value="0" step="0.01" id="input_fixed_monthly_amount" aria-label="fixed monthly amount" min="0">
          </div>

          <div class="col-md-4">
            <label class="form-label fw-semibold" for="input_expense_share_percentage">نسبة المصاريف %</label>
            <input type="number" name="expense_share_percentage" class="form-control" value="0" step="0.01" max="100" id="input_expense_share_percentage" aria-label="expense share percentage" min="0">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold" for="input_loss_share_percentage">نسبة الخسارة %</label>
            <input type="number" name="loss_share_percentage" class="form-control" value="0" step="0.01" max="100" id="input_loss_share_percentage" aria-label="loss share percentage" min="0">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold" for="input_min_profit_threshold">حد أدنى للربح</label>
            <input type="number" name="min_profit_threshold" class="form-control" value="0" step="0.01" id="input_min_profit_threshold" aria-label="min profit threshold">
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold" for="input_phone">الهاتف</label>
            <input type="text" name="phone" class="form-control" id="input_phone" aria-label="phone" pattern="^\+?[0-9\s\-]{8,20}$">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold" for="input_email">البريد</label>
            <input type="email" name="email" class="form-control" id="input_email" aria-label="email">
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">العنوان</label>
            <textarea name="address" class="form-control" rows="2" aria-label="address" maxlength="255"></textarea>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">ملاحظات</label>
            <textarea name="notes" class="form-control" rows="2" aria-label="notes" maxlength="500"></textarea>
          </div>
        </div>
      </div>
      <div class="card-footer d-flex justify-content-between">
        {% if current_user.has_permission('view_reports') %}
        <a href="{{ url_for('partners.index') }}" class="btn btn-secondary">إلغاء</a>
        {% endif %}
        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i> حفظ</button>
      </div>
    </form>
  </div>
</div>

<script>
const branches = {{ branches|map(attribute='id')|list|tojson }};
const warehouses = {{ warehouses|map(attribute='id')|list|tojson }};
const branchNames = {{ branches|map(attribute='name')|list|tojson }};
const warehouseNames = {{ warehouses|map(attribute='name')|list|tojson }};

function updateScopeOptions() {
  const scope = document.getElementById('scope_type').value;
  const container = document.getElementById('scope_id_container');
  const label = document.getElementById('scope_id_label');
  const select = document.getElementById('scope_id');

  select.innerHTML = '<option value="">— اختر —</option>';

  if (scope === 'company') {
    container.style.display = 'none';
    select.value = '';
  } else {
    container.style.display = 'block';
    if (scope === 'branch') {
      label.textContent = 'الفرع';
      branchNames.forEach((name, i) => {
        select.innerHTML += `<option value="${branches[i]}">${name}</option>`;
      });
    } else if (scope === 'warehouse') {
      label.textContent = 'المستودع';
      warehouseNames.forEach((name, i) => {
        select.innerHTML += `<option value="${warehouses[i]}">${name}</option>`;
      });
    }
  }
}
updateScopeOptions();
</script>
{% endblock %}
