version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: azad_staging
      POSTGRES_PASSWORD: CHANGE_ME_STRONG_PASSWORD
      POSTGRES_DB: azad_staging
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://azad_staging:CHANGE_ME_STRONG_PASSWORD@db:5432/azad_staging
      SECRET_KEY: CHANGE_ME_32_CHAR_SECRET_KEY
      OWNER_PASSWORD: CHANGE_ME_16_CHAR_OWNER_PASS
      APP_ENV: production
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./instance:/app/instance
      - ./uploads:/app/uploads

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.staging.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app

volumes:
  postgres_data:
