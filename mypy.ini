[mypy]
python_version = 3.11
ignore_missing_imports = True
disable_error_code = import-untyped
exclude = ^(\.venv|node_modules|\.pytest_cache|logs|instance)$

[mypy-models.*]
# Flask-SQLAlchemy uses db.Model as a class base, which mypy cannot resolve as a name.
# This is a well-known limitation — db is an instance, not a class.
disable_error_code = name-defined

[mypy-flask_login.*]
ignore_missing_imports = True

[mypy-flask_sqlalchemy.*]
ignore_missing_imports = True

[mypy-bleach.*]
ignore_missing_imports = True
